<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Room Monitor</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  .mon-intro { color:var(--t-text-dim); margin:0 0 var(--s-4); font-size:var(--f-sm); }

  .mon-status { background:var(--t-panel); border:1px solid var(--t-border);
                border-radius:var(--r-md); padding:var(--s-4); margin-bottom:var(--s-4); }
  .mon-head { display:flex; align-items:center; gap:var(--s-3); margin-bottom:var(--s-3); }
  .mon-dot  { width:12px; height:12px; border-radius:50%;
              background:var(--t-text-mute); flex-shrink:0;
              transition:background 0.2s, box-shadow 0.2s; }
  .mon-dot.live { background:var(--t-ok);
                  box-shadow:0 0 8px color-mix(in srgb, var(--t-ok) 60%, transparent); }
  .mon-dot.warn { background:var(--t-warn);
                  box-shadow:0 0 8px color-mix(in srgb, var(--t-warn) 60%, transparent); }
  .mon-dot.err  { background:var(--t-err); }
  .mon-state { font-size:var(--f-md); font-weight:700; color:var(--t-text-dim);
               letter-spacing:0.04em; }
  .mon-state.live { color:var(--t-ok); }
  .mon-state.warn { color:var(--t-warn); }
  .mon-state.err  { color:var(--t-err); }

  .mon-level-label { color:var(--t-text-dim); font-size:var(--f-xs); }
  .mon-level-track { background:var(--t-btn); border:1px solid var(--t-border);
                     border-radius:var(--r-sm); height:18px; overflow:hidden;
                     margin-top:var(--s-1); }
  .mon-level-fill  { height:100%; width:0%; background:var(--t-accent);
                     transition:width 0.08s, background 0.2s; }
  .mon-level-fill.warn { background:var(--t-warn); }
  .mon-level-fill.err  { background:var(--t-err); }
  .mon-db-line { text-align:right; font-size:var(--f-xs);
                 color:var(--t-text-dim); margin-top:var(--s-1); }

  .mon-stats { display:flex; gap:var(--s-5); font-size:var(--f-xs);
               color:var(--t-text-dim); }
  .mon-stats span span { color:var(--t-text); }

  .mon-btn { display:block; width:100%; max-width:400px; margin:0 auto var(--s-5);
             padding:var(--s-5); font:inherit; font-size:var(--f-md);
             font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
             border-radius:var(--r-md); cursor:pointer; user-select:none;
             touch-action:manipulation; -webkit-tap-highlight-color:transparent;
             background:var(--t-btn); color:var(--t-ok);
             border:2px solid var(--t-ok);
             transition:background 0.12s, color 0.12s, border-color 0.12s; }
  .mon-btn:hover { background:var(--t-ok); color:var(--t-bg); }
  .mon-btn.live { color:var(--t-err); border-color:var(--t-err); }
  .mon-btn.live:hover { background:var(--t-err); color:var(--t-bg); }
  .mon-btn.warn { color:var(--t-warn); border-color:var(--t-warn); }
  .mon-btn.warn:hover { background:var(--t-warn); color:var(--t-bg); }

  .mon-settings { max-width:400px; margin:0 auto var(--s-5); }
  .mon-settings summary { cursor:pointer; color:var(--t-text-dim);
                          font-size:var(--f-sm); padding:var(--s-2) 0; }
  .mon-settings summary:hover { color:var(--t-text); }
  .mon-setting-row { margin-bottom:var(--s-3); }
  .mon-setting-row:last-child { margin-bottom:0; }
  .mon-setting-label { color:var(--t-text-dim); font-size:var(--f-xs);
                       display:block; margin-bottom:var(--s-1); }
  .mon-setting-label span { color:var(--t-text); }
  .mon-setting-row input[type="range"] { width:100%; }
  .mon-link-row { text-align:center; margin-top:var(--s-5); }
</style>
</head>
<body>

<h1>Room Monitor</h1>
<p class="mon-intro">Streams phone microphone audio into the gateway mixer without triggering PTT.</p>

<div class="mon-status">
  <div class="mon-head">
    <span id="mon-dot" class="mon-dot"></span>
    <span id="mon-state" class="mon-state">Disconnected</span>
  </div>
  <div style="margin-bottom:var(--s-2);">
    <span class="mon-level-label">Level</span>
    <div class="mon-level-track"><div id="mon-level-bar" class="mon-level-fill"></div></div>
    <div class="mon-db-line"><span id="mon-db">—</span> dB</div>
  </div>
  <div class="mon-stats">
    <span>Duration: <span id="mon-duration">0:00</span></span>
    <span>Sent: <span id="mon-bytes">0 B</span></span>
  </div>
</div>

<button id="mon-btn" class="mon-btn" onclick="monToggle()">Start Monitor</button>

<details class="mon-settings panel">
  <summary>Settings</summary>
  <div style="padding:var(--s-3) 0 0;">
    <div class="mon-setting-row">
      <label class="mon-setting-label">Gain: <span id="mon-gain-val">25x</span></label>
      <input id="mon-gain" type="range" min="1" max="50" step="1" value="25"
        oninput="document.getElementById('mon-gain-val').textContent=this.value+'x'">
    </div>
    <div class="mon-setting-row">
      <label class="tgl"><input id="mon-vad-en" type="checkbox"> VAD (only send when sound detected)</label>
    </div>
    <div class="mon-setting-row">
      <label class="mon-setting-label">VAD Threshold: <span id="mon-vad-val">-45 dB</span></label>
      <input id="mon-vad-thr" type="range" min="-60" max="-20" step="1" value="-45"
        oninput="document.getElementById('mon-vad-val').textContent=this.value+' dB'">
    </div>
  </div>
</details>

<div class="mon-link-row">
  <a href="/monitor-apk">Download Android APK</a>
</div>

<script>
var _monWs=null, _monStream=null, _monCtx=null, _monProc=null, _monActive=false;
var _monStart=0, _monBytes=0, _monTimer=null, _monReconnTimer=null;
var _monWakeLock=null, _monSilentAudio=null;

function monToggle() {
  if (_monActive) monStop(); else monStart();
}

function monStart() {
  _monActive = true;
  monSetState('warn', 'Connecting', 'Connecting...');
  navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false, channelCount:1, sampleRate:48000 }
  }).then(function(stream) {
    _monStream = stream;
    monConnectWS();
  }).catch(function() {
    monSetState('err', 'Mic denied');
    _monActive = false;
  });
}

function monConnectWS() {
  if (!_monActive || !_monStream) return;
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  _monWs = new WebSocket(proto + '//' + location.host + '/ws_monitor');
  _monWs.binaryType = 'arraybuffer';
  _monWs.onopen = function() {
    monSetState('live', 'Live');
    _monStart = Date.now();
    _monBytes = 0;
    monStartAudio();
    monStartTimer();
    monRequestWakeLock();
    monStartSilentAudio();
  };
  _monWs.onerror = monHandleDisconnect;
  _monWs.onclose = monHandleDisconnect;
}

function monStartAudio() {
  if (!_monStream) return;
  _monCtx = new AudioContext({sampleRate: 48000});
  var source = _monCtx.createMediaStreamSource(_monStream);
  _monProc = _monCtx.createScriptProcessor(2048, 1, 1);
  _monProc.onaudioprocess = function(e) {
    if (!_monWs || _monWs.readyState !== 1) return;
    var f32 = e.inputBuffer.getChannelData(0);
    var gain = parseFloat(document.getElementById('mon-gain').value) || 1;

    var sum = 0, peak = 0;
    for (var i = 0; i < f32.length; i++) {
      var s = f32[i] * gain;
      sum += s * s;
      var a = Math.abs(s);
      if (a > peak) peak = a;
    }
    var rms = Math.sqrt(sum / f32.length);
    var db = rms > 0 ? 20 * Math.log10(rms) : -100;

    var pct = Math.min(100, Math.max(0, Math.round((db + 60) * (100 / 60))));
    var bar = document.getElementById('mon-level-bar');
    bar.style.width = pct + '%';
    bar.classList.toggle('warn', pct >= 70 && pct < 90);
    bar.classList.toggle('err',  pct >= 90);
    document.getElementById('mon-db').textContent = db > -100 ? db.toFixed(1) : '—';

    var vadEn = document.getElementById('mon-vad-en').checked;
    var vadThr = parseFloat(document.getElementById('mon-vad-thr').value) || -45;
    if (vadEn && db < vadThr) return;

    var buf = new ArrayBuffer(f32.length * 2);
    var i16 = new Int16Array(buf);
    for (var i = 0; i < f32.length; i++) {
      var s = Math.max(-1, Math.min(1, f32[i] * gain));
      i16[i] = s < 0 ? s * 32768 : s * 32767;
    }
    _monWs.send(buf);
    _monBytes += buf.byteLength;
  };
  source.connect(_monProc);
  _monProc.connect(_monCtx.destination);
}

function monStartTimer() {
  if (_monTimer) clearInterval(_monTimer);
  _monTimer = setInterval(function() {
    if (!_monActive) return;
    var elapsed = Math.floor((Date.now() - _monStart) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    document.getElementById('mon-duration').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    var b = _monBytes;
    var units = ['B', 'KB', 'MB', 'GB'];
    var u = 0;
    while (b >= 1024 && u < units.length - 1) { b /= 1024; u++; }
    document.getElementById('mon-bytes').textContent = (u > 0 ? b.toFixed(1) : b) + ' ' + units[u];
  }, 1000);
}

function monHandleDisconnect() {
  monStopAudio();
  if (_monTimer) { clearInterval(_monTimer); _monTimer = null; }
  if (_monActive) {
    monSetState('warn', 'Reconnecting', 'Reconnecting...');
    if (_monReconnTimer) clearTimeout(_monReconnTimer);
    _monReconnTimer = setTimeout(function() {
      _monReconnTimer = null;
      if (_monActive && _monStream) monConnectWS();
    }, 5000);
  } else {
    monSetState('', 'Disconnected');
  }
}

function monStop() {
  _monActive = false;
  if (_monReconnTimer) { clearTimeout(_monReconnTimer); _monReconnTimer = null; }
  monStopAudio();
  if (_monWs) { try { _monWs.close(); } catch(e){} _monWs = null; }
  if (_monStream) { _monStream.getTracks().forEach(function(t){t.stop();}); _monStream = null; }
  if (_monTimer) { clearInterval(_monTimer); _monTimer = null; }
  monReleaseWakeLock();
  monStopSilentAudio();
  monSetState('', 'Disconnected');
  var bar = document.getElementById('mon-level-bar');
  bar.style.width = '0%';
  bar.classList.remove('warn','err');
  document.getElementById('mon-db').textContent = '—';
  document.getElementById('mon-duration').textContent = '0:00';
  document.getElementById('mon-bytes').textContent = '0 B';
}

function monStopAudio() {
  if (_monProc) { _monProc.disconnect(); _monProc = null; }
  if (_monCtx) { _monCtx.close().catch(function(){}); _monCtx = null; }
}

function monSetState(cls, label, btnLabel) {
  var dot = document.getElementById('mon-dot');
  var state = document.getElementById('mon-state');
  var btn = document.getElementById('mon-btn');
  state.textContent = label;
  dot.className = 'mon-dot' + (cls ? ' ' + cls : '');
  state.className = 'mon-state' + (cls ? ' ' + cls : '');
  if (cls === 'live') {
    btn.className = 'mon-btn live';
    btn.textContent = btnLabel || 'Stop Monitor';
  } else if (cls === 'warn') {
    btn.className = 'mon-btn warn';
    btn.textContent = btnLabel || 'Stop Monitor';
  } else {
    btn.className = 'mon-btn';
    btn.textContent = btnLabel || 'Start Monitor';
  }
}

function monRequestWakeLock() {
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').then(function(wl) {
      _monWakeLock = wl;
      _monWakeLock.addEventListener('release', function() { _monWakeLock = null; });
    }).catch(function(){});
  }
}
function monReleaseWakeLock() {
  if (_monWakeLock) { _monWakeLock.release().catch(function(){}); _monWakeLock = null; }
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && _monActive) monRequestWakeLock();
});

function monStartSilentAudio() {
  if (_monSilentAudio) return;
  _monSilentAudio = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
  _monSilentAudio.loop = true;
  _monSilentAudio.volume = 0.01;
  _monSilentAudio.play().catch(function(){});
}
function monStopSilentAudio() {
  if (_monSilentAudio) { _monSilentAudio.pause(); _monSilentAudio = null; }
}
</script>

<script src="/pages/common.js"></script>
</body>
</html>
