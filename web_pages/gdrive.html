<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Drive</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  .gd-row { display:flex; gap:var(--s-3); align-items:center; margin-bottom:var(--s-1);
            font-size:var(--f-sm); }
  .gd-label { color:var(--t-text-dim); min-width:110px; }
  .gd-val { color:var(--t-text); font-family:inherit; }
  .gd-val.ok  { color:var(--t-ok); }
  .gd-val.err { color:var(--t-err); }

  .gd-toolbar { display:flex; align-items:center; gap:var(--s-3);
                padding:var(--s-2) 0; font-size:var(--f-sm); }
  .gd-msg { color:var(--t-text-dim); font-size:var(--f-xs); }

  .file-tbl { width:100%; border-collapse:collapse; font-size:var(--f-xs);
              margin-top:var(--s-2); }
  .file-tbl th { text-align:left; color:var(--t-text-dim);
                 padding:var(--s-1) var(--s-2); border-bottom:1px solid var(--t-border);
                 font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
  .file-tbl td { padding:var(--s-1) var(--s-2); color:var(--t-text);
                 font-family:inherit; border-bottom:1px solid var(--t-border); }
  .file-tbl tr:hover td { background:var(--t-panel-hi); }
  .file-size { color:var(--t-text-dim); }
  .file-empty { color:var(--t-text-mute); font-style:italic; }
  .file-err   { color:var(--t-err); }

  .not-configured { color:var(--t-text-mute); text-align:center;
                    padding:60px 0; font-size:var(--f-md); }
</style>
</head>
<body>

<div id="content">
  <div class="panel" id="status-card">
    <div class="gd-row"><span class="gd-label">Status</span><span class="gd-val" id="st-status">--</span></div>
    <div class="gd-row"><span class="gd-label">Remote</span><span class="gd-val" id="st-remote">--</span></div>
    <div class="gd-row"><span class="gd-label">Folder</span><span class="gd-val" id="st-folder">--</span></div>
    <div class="gd-row"><span class="gd-label">Storage</span><span class="gd-val" id="st-storage">--</span></div>
    <div class="gd-row"><span class="gd-label">Tunnel URL</span><span class="gd-val" id="st-tunnel">--</span></div>
  </div>

  <div class="gd-toolbar">
    <button class="rb rb-sm" onclick="refreshFiles()">Refresh</button>
    <button class="rb rb-sm" onclick="publishTunnel()">Publish Tunnel URL</button>
    <span class="gd-msg" id="action-status"></span>
  </div>

  <div id="files-container">
    <table class="file-tbl">
      <thead><tr><th>Name</th><th>Size</th><th>Modified</th><th>Type</th></tr></thead>
      <tbody id="files-body"><tr><td colspan="4" class="file-empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div id="not-configured" class="not-configured" style="display:none;">
  Google Drive not configured.<br>
  Set <b>ENABLE_GDRIVE</b>, <b>GDRIVE_CREDENTIALS</b>, and <b>GDRIVE_FOLDER_ID</b> in the config.
</div>

<script>
function setVal(id, text, cls) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'gd-val' + (cls ? ' ' + cls : '');
}

function init() {
  loadStatus();
  loadFiles();
}

function loadStatus() {
  fetch('/api/gdrive/status').then(function(r){return r.json();}).then(function(d) {
    if (!d.configured) {
      document.getElementById('content').style.display = 'none';
      document.getElementById('not-configured').style.display = '';
      return;
    }
    if (d.authenticated && d.folder_accessible) {
      setVal('st-status', 'Connected', 'ok');
    } else if (d.authenticated) {
      setVal('st-status', 'Auth OK (folder error: ' + (d.folder_error || '?') + ')', 'err');
    } else {
      setVal('st-status', d.folder_error || 'Not connected', 'err');
    }
    document.getElementById('st-remote').textContent = d.remote || '--';
    document.getElementById('st-folder').textContent = d.folder_path || '--';
    if (d.total_bytes) {
      var used = fmtBytes(d.used_bytes || 0);
      var total = fmtBytes(d.total_bytes || 0);
      var free = fmtBytes(d.free_bytes || 0);
      document.getElementById('st-storage').textContent = used + ' / ' + total + ' (' + free + ' free)';
    }
  }).catch(function(e) {
    setVal('st-status', 'Error: ' + e.message, 'err');
  });

  fetch('/api/tunnel/link-url').then(function(r){return r.json();}).then(function(d) {
    if (d.ws_link) setVal('st-tunnel', d.ws_link, 'ok');
    else setVal('st-tunnel', 'No tunnel active', 'err');
  }).catch(function(){});
}

function loadFiles() { refreshFiles(); }

function refreshFiles() {
  fetch('/api/gdrive/files').then(function(r){return r.json();}).then(function(d) {
    var tbody = document.getElementById('files-body');
    if (!d.files || !d.files.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="file-empty">No files</td></tr>';
      return;
    }
    var html = '';
    for (var i = 0; i < d.files.length; i++) {
      var f = d.files[i];
      var size = f.size ? fmtBytes(parseInt(f.size)) : '--';
      var mod = f.modifiedTime ? f.modifiedTime.replace('T',' ').replace('Z','').substring(0,19) : '--';
      var mime = (f.mimeType || '').split('/').pop().substring(0,20);
      html += '<tr><td>' + f.name + '</td><td class="file-size">' + size + '</td><td>' + mod + '</td><td>' + mime + '</td></tr>';
    }
    tbody.innerHTML = html;
  }).catch(function(e) {
    document.getElementById('files-body').innerHTML = '<tr><td colspan="4" class="file-err">Error: ' + e.message + '</td></tr>';
  });
}

function publishTunnel() {
  var el = document.getElementById('action-status');
  el.textContent = 'Publishing...';
  fetch('/api/gdrive/publish-tunnel', {method:'POST'}).then(function(r){return r.json();}).then(function(d) {
    if (d.ok) {
      el.textContent = 'Published tunnel URL to Drive';
      refreshFiles();
    } else {
      el.textContent = 'Error: ' + (d.error || 'unknown');
    }
  }).catch(function(e){ el.textContent = 'Error: ' + e.message; });
}

function fmtBytes(b) {
  if (b >= 1073741824) return (b/1073741824).toFixed(1) + ' GB';
  if (b >= 1048576) return (b/1048576).toFixed(1) + ' MB';
  if (b >= 1024) return (b/1024).toFixed(0) + ' KB';
  return b + ' B';
}

init();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
