<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dell - Radio Gateway</title>
<link rel="preload" href="/pages/fonts/JetBrainsMono.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/pages/common.css">
<style>
  /* Shell-local styles. Theme vars come from common.css. */
  * { margin: 0; padding: 0; }
  body { display: flex; flex-direction: column; height: 100vh; padding: 0; }

  #shell-bar {
    background: var(--t-panel);
    border-bottom: 1px solid var(--t-border);
    padding: var(--s-1) var(--s-3);
    display: flex; align-items: center; flex-wrap: wrap;
    gap: var(--s-3);
    flex-shrink: 0; min-height: 34px; z-index: 100;
  }

  /* Nav items — uppercase micro-caps, dim default, accent on hover/active */
  #shell-bar a,
  .nav-group > .nav-label {
    color: var(--t-text-dim);
    text-decoration: none;
    font-size: var(--f-md);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    padding: var(--s-1) var(--s-3);
    cursor: pointer;
    user-select: none;
    transition: color 0.1s;
  }
  #shell-bar a:hover,
  .nav-group > .nav-label:hover,
  .nav-group.open > .nav-label,
  .nav-group.has-active > .nav-label { color: var(--t-accent); text-decoration: none; }
  #shell-bar a.active { color: var(--t-accent); }
  #shell-bar a.nav-disabled {
    color: var(--t-text-mute); cursor: default; pointer-events: none;
  }

  .shell-nav { display: flex; flex-wrap: wrap; align-items: center; gap: 0; }
  .shell-nav > a + a,
  .shell-nav > a + .nav-group,
  .shell-nav > .nav-group + a,
  .shell-nav > .nav-group + .nav-group {
    border-left: 1px solid var(--t-border);
  }

  .nav-group { position: relative; }
  .nav-group > .nav-label::after {
    content: ' \25BE'; font-size: 0.7em; opacity: 0.5; margin-left: 2px;
  }
  .nav-drop {
    display: none; position: absolute; top: 100%; left: 0;
    background: var(--t-panel);
    border: 1px solid var(--t-border);
    border-top: none;
    min-width: 140px; z-index: 200;
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
    padding: var(--s-1) 0;
  }
  .nav-group.open > .nav-drop { display: block; }
  .nav-drop a {
    display: block;
    padding: var(--s-1) var(--s-3) !important;
    border-left: none !important;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  .nav-drop a:hover { background: var(--t-panel-hi); color: var(--t-accent); }
  .nav-drop a.active { background: var(--t-btn-active); color: var(--t-accent); }
  .nav-drop a.active::after { display: none; }

  /* Audio control cluster */
  .shell-pcm {
    display: inline-flex; gap: var(--s-1); align-items: center;
    padding-left: var(--s-3);
    border-left: 1px solid var(--t-border);
    margin-left: auto;
  }
  /* Uses .rb-caps + .rb-sm from common.css — only the min-width is shell-local. */
  .shell-pcm .rb { min-width: 56px; text-align: center; }
  .shell-pcm .rb.connecting { color: var(--t-warn); border-color: var(--t-warn); }
  .shell-pcm .rb.live { color: var(--t-err); border-color: var(--t-err); }
  .shell-pcm input[type="range"] { width: 52px; height: 3px; }

  #shell-frame { flex: 1; border: none; width: 100%; background: var(--t-bg); }

  /* Level meter strip — primary signal real-estate. This is the gateway's
     vital-sign display: give it weight, inset channels, phosphor glow. */
  #shell-bars {
    background:
      linear-gradient(180deg, var(--t-panel) 0%, color-mix(in srgb, var(--t-panel) 92%, #000) 100%);
    border-top: 1px solid var(--t-border);
    border-bottom: 1px solid var(--t-border);
    padding: var(--s-2) var(--s-3);
    display: flex; flex-wrap: wrap;
    gap: var(--s-2) var(--s-4);
    align-items: center;
    flex-shrink: 0;
    min-height: 44px;
  }
  #shell-bars .sb {
    display: flex; gap: var(--s-2); align-items: center;
    white-space: nowrap;
  }
  #shell-bars .sb-label {
    color: var(--t-text-dim);
    font-size: var(--f-xs);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    min-width: 3.4em;
    text-align: right;
    flex-shrink: 0;
  }
  #shell-bars .sb-pct {
    width: 2.8em; text-align: right;
    font-size: var(--f-xs);
    color: var(--t-text-dim);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  #shell-bars .sb-pct.ducked { color: var(--t-warn); }
  #shell-bars .sb-track {
    position: relative;
    width: 140px; height: 18px;
    background: #05080b;
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    flex-shrink: 0; overflow: hidden;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.7),
      inset 0 -1px 0 rgba(255,255,255,0.02);
  }
  /* Zone ticks at 70% (warn onset) and 95% (ceiling) — live inside the track,
     behind the bar fill but visible through it, so you can read headroom. */
  #shell-bars .sb-track::before,
  #shell-bars .sb-track::after {
    content: '';
    position: absolute;
    top: 2px; bottom: 2px;
    width: 1px;
    pointer-events: none;
    z-index: 2;
  }
  #shell-bars .sb-track::before { left: 70%; background: var(--t-warn); opacity: 0.35; }
  #shell-bars .sb-track::after  { left: 95%; background: var(--t-err);  opacity: 0.45; }
  #shell-bars .sb-bar {
    display: block;
    position: absolute;
    left: 0; width: 0%;
    height: calc(50% - 3px);
    transition: width 0.08s linear;
    box-shadow: 0 0 6px currentColor;
    z-index: 1;
  }
  /* Semantic bar colors: in=receive, out=transmit, loc=local output.
     color = background so the currentColor glow matches the fill hue.
     Position mirrors dual-lane layout: RX types sit in top half, TX/output in bottom half. */
  .sb-in         { background: var(--t-ok);     color: var(--t-ok);     top: 2px; }
  .sb-out        { background: var(--t-err);    color: var(--t-err);    bottom: 2px; }
  .sb-loc        { background: var(--t-accent); color: var(--t-accent); bottom: 2px; }
  .sb-ducked-bar { background: var(--t-warn);   color: var(--t-warn);   top: 2px; }
  /* Dual-lane bars: RX (green) top half, TX (red) bottom half — no pct label. */
  .sb-bar-rx, .sb-bar-tx {
    position: absolute; left: 0; width: 0%;
    height: calc(50% - 3px);
    box-shadow: 0 0 5px currentColor;
    z-index: 1;
    transition: width 0.08s linear;
  }
  .sb-bar-rx { top: 2px;    background: var(--t-ok);  color: var(--t-ok); }
  .sb-bar-tx { bottom: 2px; background: var(--t-err); color: var(--t-err); }

  #shell-bars .mute-ind {
    color: var(--t-err);
    font-weight: 700;
    font-size: var(--f-xs);
    letter-spacing: 0.1em;
  }

  /* Mobile: let bars scroll off screen */
  @media (max-width: 768px) {
    body { height: auto; overflow: auto; }
    #shell-bars { flex-shrink: 1; }
    #shell-frame { flex: none; height: calc(100vh - 78px); }
  }

  /* Header identity cluster — sits directly after the nav groups (left-packed),
     styled as a callsign plate. Small beacon LED (pulses green when server
     healthy), callsign in display font + phosphor, site name, local clock. */
  .id-cluster.shell-id {
    padding: 2px var(--s-3);
    display: inline-flex;
    align-items: center;
    gap: var(--s-2);
    background: linear-gradient(180deg, #0a0f14 0%, #05080b 100%);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.02),
      inset 0 -1px 0 rgba(0,0,0,0.4);
  }
  .id-led {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--t-ok);
    box-shadow: 0 0 6px var(--t-ok);
    flex-shrink: 0;
    animation: id-beacon 2.4s ease-in-out infinite;
  }
  .id-led.stale { background: var(--t-warn); box-shadow: 0 0 6px var(--t-warn); }
  .id-led.dead  { background: var(--t-err);  box-shadow: 0 0 6px var(--t-err); animation: none; }
  @keyframes id-beacon {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  .id-cluster.shell-id .id-call {
    font-family: var(--font-display);
    color: var(--t-text);
    font-weight: 700;
    font-size: var(--f-md);
    letter-spacing: 0.08em;
  }
  .id-cluster.shell-id .id-site {
    color: var(--t-text);
    font-size: var(--f-base);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .id-cluster.shell-id .id-clock {
    font-family: var(--font-display);
    color: var(--t-text);
    font-size: var(--f-md);
    letter-spacing: 0.06em;
    margin-left: 0;
  }
  .id-cluster.shell-id .id-sep { color: var(--t-border-hi); }
</style>
</head><body>
<div id="shell-bar">
  <div class="shell-nav">
    <div class="id-cluster shell-id" title="Gateway identity">
      <span class="id-led" id="id-led" title="Gateway healthy"></span>
      <span class="id-call" id="id-call" style="display:none"></span>
      <span class="id-sep" id="id-call-sep" style="display:none">&middot;</span>
      <span class="id-site" id="id-site">--</span>
      <span class="id-sep">&middot;</span>
      <span class="id-clock" id="id-clock">--:--</span>
    </div>
    <a href="/dashboard" target="content" onclick="setActive(this)">Dashboard</a><div class="nav-group" onclick="toggleGroup(this)"><span class="nav-label">Audio</span><div class="nav-drop">
      <a href="/routing" target="content" onclick="setActive(this)">Routing</a>
      <a href="/monitor" target="content" onclick="setActive(this)">Monitor</a>
      <a href="/recordings" target="content" onclick="setActive(this)">Recordings</a>
      <a href="/recorder" target="content" onclick="setActive(this)">Loop Recorder</a>
      <a href="/transcribe" target="content" onclick="setActive(this)">Transcribe</a>
      <a href="/txlog" target="content" onclick="setActive(this)">Tx Log</a>
    </div></div><div class="nav-group" onclick="toggleGroup(this)"><span class="nav-label">Radios</span><div class="nav-drop">
      <a href="/radio" target="content" onclick="setActive(this)" id="nav-radio">TH-9800</a>
      <a href="/d75" target="content" onclick="setActive(this)" id="nav-d75">TH-D75</a>
      <a href="/kv4p" target="content" onclick="setActive(this)" id="nav-kv4p">KV4P</a>
      <a href="/sdr" target="content" onclick="setActive(this)" id="nav-sdr">SDR</a>
    </div></div><div class="nav-group" onclick="toggleGroup(this)"><span class="nav-label">Data</span><div class="nav-drop">
      <a href="/gps" target="content" onclick="setActive(this)" id="nav-gps">GPS</a>
      <a href="/repeaters" target="content" onclick="setActive(this)" id="nav-repeaters">Repeaters</a>
      <a href="/aircraft" target="content" onclick="setActive(this)" id="nav-adsb">ADS-B</a>
      <a href="/telegram" target="content" onclick="setActive(this)" id="nav-telegram">Telegram</a>
      <a href="/packet" target="content" onclick="setActive(this)" id="nav-packet">Packet</a>
      <a href="/gdrive" target="content" onclick="setActive(this)">GDrive</a>
    </div></div><div class="nav-group" onclick="toggleGroup(this)"><span class="nav-label">System</span><div class="nav-drop">
      <a href="/voice" target="content" onclick="setActive(this)">Voice</a>
      <a href="/config" target="content" onclick="setActive(this)">Config</a>
      <a href="/logs" target="content" onclick="setActive(this)">Logs</a>
    </div></div>
    <span class="shell-pcm">
      <button id="play-btn" class="rb rb-caps rb-sm" onclick="toggleStream()"><span class="icon icon-play"></span> MP3</button>
      <input id="vol-slider" type="range" min="0" max="100" value="50" oninput="setVolume(this.value)">
      <button id="ws-btn" class="rb rb-caps rb-sm" onclick="toggleWS()"><span class="icon icon-play"></span> PCM</button>
      <input id="ws-vol" type="range" min="0" max="100" value="50" oninput="setWSVol(this.value)">
      <button id="mic-btn" class="rb rb-caps rb-sm" onclick="toggleMic()"><span class="icon icon-mic"></span> MIC</button>
    </span>
  </div>
</div>
<div id="shell-bars"></div>
<iframe id="shell-frame" name="content" src="/dashboard"></iframe>
<script src="/pages/common.js"></script>
<script>

function setActive(el) {
  document.querySelectorAll('.shell-nav a').forEach(function(a){ a.classList.remove('active'); });
  el.classList.add('active');
  // Close all dropdowns after clicking a link
  document.querySelectorAll('.nav-group').forEach(function(g){ g.classList.remove('open'); });
}
function toggleGroup(g) {
  // If the click was on an <a> inside the dropdown, don't toggle
  if (event && event.target.tagName === 'A') return;
  var wasOpen = g.classList.contains('open');
  document.querySelectorAll('.nav-group').forEach(function(x){ x.classList.remove('open'); });
  if (!wasOpen) g.classList.add('open');
}
// Close dropdowns when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-group')) {
    document.querySelectorAll('.nav-group').forEach(function(g){ g.classList.remove('open'); });
  }
});

// Identity: site name from /sysinfo (poll slowly), local clock ticks locally.
function tickClock() {
  var d = new Date();
  var hh = String(d.getHours()).padStart(2,'0');
  var mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('id-clock').textContent = hh+':'+mm;
}
setInterval(tickClock, 15000);
tickClock();
function loadIdentity() {
  fetch('/sysinfo').then(function(r){return r.json();}).then(function(s) {
    var name = s.gateway_name || s.hostname || '';
    if (name) document.getElementById('id-site').textContent = name;
    var call = (s.callsign || '').trim();
    var callEl = document.getElementById('id-call');
    var sepEl  = document.getElementById('id-call-sep');
    if (call) {
      callEl.textContent = call;
      callEl.style.display = '';
      sepEl.style.display = '';
    } else {
      callEl.style.display = 'none';
      sepEl.style.display = 'none';
    }
    var led = document.getElementById('id-led');
    led.classList.remove('stale','dead');
  }).catch(function(){
    var led = document.getElementById('id-led');
    led.classList.remove('stale'); led.classList.add('dead');
  });
}
setInterval(loadIdentity, 60000);
loadIdentity();
// --- MP3 stream player ---
var _audio = null;
var _playing = false;
var _streamTimer = null;
var _streamStart = 0;
function toggleStream() {
  if (_playing) { stopStream(); } else { startStream(); }
}
function startStream() {
  if (_audio) { try { _audio.onplaying = null; _audio.onerror = null; _audio.onended = null; _audio.pause(); _audio.src = ''; } catch(e){} _audio = null; }
  if (_streamTimer) { clearInterval(_streamTimer); _streamTimer = null; }

  var btn = document.getElementById('play-btn');
  _playing = true;
  btn.innerHTML = '<span class="icon icon-stop"></span> ...'; btn.classList.add('connecting'); btn.classList.remove('live');

  _audio = new Audio('/stream');
  _audio.volume = document.getElementById('vol-slider').value / 100;

  _audio.onplaying = function() {
    _playing = true;
    _streamStart = Date.now();
    btn.innerHTML = '<span class="icon icon-stop"></span> 0:00'; btn.classList.remove('connecting'); btn.classList.add('live');
    _streamTimer = setInterval(function() {
      var s = Math.floor((Date.now() - _streamStart) / 1000);
      btn.innerHTML = '<span class="icon icon-stop"></span> ' + Math.floor(s/60) + ':' + (s%60<10?'0':'') + s%60;
    }, 1000);
  };

  _audio.onerror = function() {
    stopStream();
  };

  _audio.onended = function() { stopStream(); };

  _audio.play().catch(function(e) {
    stopStream();
  });
}
function stopStream() {
  if (_streamTimer) { clearInterval(_streamTimer); _streamTimer = null; }
  if (_audio) { try { _audio.pause(); _audio.src = ''; } catch(e){} _audio = null; }
  _playing = false;
  var _pb = document.getElementById('play-btn');
  _pb.innerHTML = '<span class="icon icon-play"></span> MP3';
  _pb.classList.remove('connecting', 'live');
}
function setVolume(v) {
  if (_audio) _audio.volume = v / 100;
}

// Highlight nav on iframe load
document.getElementById('shell-frame').addEventListener('load', function() {
  try {
    var path = this.contentWindow.location.pathname;
    document.querySelectorAll('.shell-nav a').forEach(function(a) {
      a.classList.toggle('active', a.getAttribute('href') === path);
    });
    // Highlight parent group label when child is active
    document.querySelectorAll('.nav-group').forEach(function(g) {
      g.classList.toggle('has-active', !!g.querySelector('a.active'));
    });
  } catch(e) {}
});

// --- Low-latency WebSocket PCM player ---
var _ws = null;
var _wsCtx = null;
var _wsGain = null;
var _wsPlaying = false;
var _wsTimer = null;
var _wsStart = 0;
var _wsBytes = 0;
var _wsWorklet = null;
var _wakeLock = null;

function toggleWS() {
  if (_wsPlaying) { stopWS(); } else { startWS(); }
}

function startWS() {
  var btn = document.getElementById('ws-btn');
  btn.innerHTML = '<span class="icon icon-stop"></span> ...';
  btn.classList.add('connecting'); btn.classList.remove('live');

  if (_wsCtx) { stopWS(); return; }

  try {
    _wsCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 48000});
  } catch(e) {
    btn.innerHTML = '<span class="icon icon-play"></span> PCM'; btn.classList.remove('connecting', 'live');
    return;
  }
  if (_wsCtx.state === 'suspended') { _wsCtx.resume(); }

  _wsGain = _wsCtx.createGain();
  _wsGain.gain.value = document.getElementById('ws-vol').value / 100;
  _wsGain.connect(_wsCtx.destination);

  var _pcmBuf = [];
  var _pcmPos = 0;
  var _pcmTotal = 0;
  var _pcmReady = false;

  function _drainPCM(output) {
    var w = 0, need = output.length;
    if (!_pcmReady) {
      if (_pcmTotal < 2400) { for (w = 0; w < need; w++) output[w] = 0; return; }
      _pcmReady = true;
    }
    while (_pcmTotal > 9600 && _pcmBuf.length > 1) { _pcmTotal -= _pcmBuf[0].length; _pcmBuf.shift(); _pcmPos = 0; }
    while (w < need) {
      if (!_pcmBuf.length) { for (; w < need; w++) output[w] = 0; break; }
      var cur = _pcmBuf[0], avail = cur.length - _pcmPos;
      var take = Math.min(avail, need - w);
      for (var j = 0; j < take; j++) output[w++] = cur[_pcmPos++];
      if (_pcmPos >= cur.length) { _pcmTotal -= cur.length; _pcmBuf.shift(); _pcmPos = 0; }
    }
  }

  function _connectWS() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    _ws = new WebSocket(proto + '//' + location.host + '/ws_audio');
    _ws.binaryType = 'arraybuffer';
    _ws.onopen = function() {
      _wsPlaying = true;
      _wsStart = Date.now();
      _wsBytes = 0;
      if (navigator.wakeLock) { navigator.wakeLock.request('screen').then(function(wl) { _wakeLock = wl; }).catch(function(){}); }
      btn.classList.remove('connecting'); btn.classList.add('live');
      btn.innerHTML = '<span class="icon icon-stop"></span> 0:00';
      _wsTimer = setInterval(function() {
        var secs = Math.floor((Date.now() - _wsStart) / 1000);
        var m = Math.floor(secs / 60);
        var s = secs % 60;
        btn.innerHTML = '<span class="icon icon-stop"></span> ' + m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);
    };

    var _srcRate = 48000;
    var _dstRate = _wsCtx.sampleRate;
    var _resample = (_dstRate !== _srcRate);

    _ws.onmessage = function(ev) {
      if (ev.data instanceof ArrayBuffer) {
        _wsBytes += ev.data.byteLength;
        var int16 = new Int16Array(ev.data);
        var float32 = new Float32Array(int16.length);
        for (var i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
        if (_resample) {
          var ratio = _srcRate / _dstRate;
          var outLen = Math.round(float32.length / ratio);
          var resampled = new Float32Array(outLen);
          for (var i = 0; i < outLen; i++) {
            var srcIdx = i * ratio;
            var idx0 = Math.floor(srcIdx);
            var frac = srcIdx - idx0;
            var s0 = float32[idx0] || 0;
            var s1 = float32[Math.min(idx0 + 1, float32.length - 1)] || 0;
            resampled[i] = s0 + frac * (s1 - s0);
          }
          float32 = resampled;
        }
        if (_wsWorklet && _wsWorklet.port) {
          _wsWorklet.port.postMessage(float32);
        } else {
          _pcmBuf.push(float32);
          _pcmTotal += float32.length;
          while (_pcmBuf.length > 4) { _pcmTotal -= _pcmBuf[0].length; _pcmBuf.shift(); _pcmPos = 0; }
        }
      }
    };
    _ws.onerror = function() { stopWS(); };
    _ws.onclose = function() { if (_wsPlaying) stopWS(); };
  }

  if (_wsCtx.audioWorklet) {
    var workletCode = 'class P extends AudioWorkletProcessor{constructor(){super();this.b=[];this.p=0;this.tot=0;this.ready=false;this.port.onmessage=e=>{this.b.push(e.data);this.tot+=e.data.length;if(!this.ready&&this.tot>=2400)this.ready=true;if(this.tot>9600){while(this.tot>2400&&this.b.length>1){this.tot-=this.b[0].length;this.b.shift()}this.p=0}}}process(i,o){var c=o[0][0];if(!c)return true;var n=c.length,w=0;if(!this.ready){for(w=0;w<n;w++)c[w]=0;return true}while(w<n){if(!this.b.length){for(;w<n;w++)c[w]=0;break}var r=this.b[0],a=r.length-this.p,t=Math.min(a,n-w);for(var j=0;j<t;j++)c[w++]=r[this.p++];if(this.p>=r.length){this.b.shift();this.p=0;this.tot-=r.length}}return true}}registerProcessor("p",P)';
    var blob = new Blob([workletCode], {type: 'application/javascript'});
    var blobURL = URL.createObjectURL(blob);
    _wsCtx.audioWorklet.addModule(blobURL).then(function() {
      URL.revokeObjectURL(blobURL);
      _wsWorklet = new AudioWorkletNode(_wsCtx, 'p', {outputChannelCount:[1], numberOfOutputs:1});
      _wsWorklet.connect(_wsGain);
      _connectWS();
    }).catch(function(e) {
      URL.revokeObjectURL(blobURL);
      var sp = _wsCtx.createScriptProcessor(2048, 0, 1);
      sp.onaudioprocess = function(ev) { _drainPCM(ev.outputBuffer.getChannelData(0)); };
      sp.connect(_wsGain);
      _wsWorklet = sp;
      _connectWS();
    });
  } else {
    var sp = _wsCtx.createScriptProcessor(2048, 0, 1);
    sp.onaudioprocess = function(ev) { _drainPCM(ev.outputBuffer.getChannelData(0)); };
    sp.connect(_wsGain);
    _wsWorklet = sp;
    _connectWS();
  }
}

function stopWS() {
  if (_wsTimer) { clearInterval(_wsTimer); _wsTimer = null; }
  if (_ws) { try { _ws.close(); } catch(e){} _ws = null; }
  if (_wsWorklet) { try { _wsWorklet.disconnect(); } catch(e){} _wsWorklet = null; }
  if (_wsGain) { try { _wsGain.disconnect(); } catch(e){} _wsGain = null; }
  if (_wsCtx) { try { _wsCtx.close(); } catch(e){} _wsCtx = null; }
  _wsPlaying = false;
  if (_wakeLock) { try { _wakeLock.release(); } catch(e){} _wakeLock = null; }
  var _wb = document.getElementById('ws-btn');
  _wb.innerHTML = '<span class="icon icon-play"></span> PCM';
  _wb.classList.remove('connecting', 'live');
}

function setWSVol(v) {
  if (_wsGain) _wsGain.gain.value = v / 100;
}

// --- Browser Mic → WebMicSource ---
var _micWs=null, _micStream=null, _micCtx=null, _micProc=null, _micActive=false;

function toggleMic() {
  if (_micActive) { stopMic(); return; }
  // Ensure clean state before starting
  stopMic();
  _micActive = true;
  var btn=document.getElementById('mic-btn');
  btn.innerHTML = '<span class="icon icon-stop"></span> ...'; btn.classList.add('connecting'); btn.classList.remove('live');

  navigator.mediaDevices.getUserMedia({audio:{sampleRate:48000,channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}})
  .then(function(stream) {
    _micStream = stream;
    var proto = location.protocol==='https:' ? 'wss:' : 'ws:';
    _micWs = new WebSocket(proto+'//'+location.host+'/ws_mic');
    _micWs.binaryType = 'arraybuffer';
    _micWs.onopen = function() {
      btn.innerHTML='<span class="icon icon-stop"></span> TX'; btn.classList.remove('connecting'); btn.classList.add('live');
      _micCtx = new AudioContext({sampleRate:48000});
      var src = _micCtx.createMediaStreamSource(stream);
      var proc = _micCtx.createScriptProcessor(2048,1,1);
      proc.onaudioprocess = function(e) {
        if (!_micWs || _micWs.readyState!==1) return;
        var f32=e.inputBuffer.getChannelData(0), buf=new ArrayBuffer(f32.length*2), i16=new Int16Array(buf);
        for (var i=0;i<f32.length;i++) { var s=Math.max(-1,Math.min(1,f32[i])); i16[i]=s<0?s*32768:s*32767; }
        _micWs.send(buf);
      };
      src.connect(proc); proc.connect(_micCtx.destination); _micProc=proc;
    };
    _micWs.onerror = function() { if (_micActive) stopMic(); };
    _micWs.onclose = function() { if (_micActive) stopMic(); };
  }).catch(function() {
    _micActive=false;
    btn.innerHTML='<span class="icon icon-mic"></span> MIC'; btn.classList.remove('connecting', 'live');
  });
}

function stopMic() {
  _micActive=false;
  if(_micProc){_micProc.disconnect();_micProc=null;}
  if(_micCtx){_micCtx.close().catch(function(){});_micCtx=null;}
  if(_micStream){_micStream.getTracks().forEach(function(t){t.stop();});_micStream=null;}
  if(_micWs){try{_micWs.close();}catch(e){}_micWs=null;}
  var btn=document.getElementById('mic-btn');
  btn.innerHTML='<span class="icon icon-mic"></span> MIC'; btn.classList.remove('connecting', 'live');
}

// --- Audio level bars (always visible) ---
// Semantic bar classes: sb-in (receive), sb-out (transmit), sb-loc (local output).
// Ducked overrides to amber — identity comes from the text label, not hue.
// In-place DOM updates (keyed by label) let the CSS width transition actually run.
var _sbRows = {};   // key -> {row, bar, mute}
var _sbSmooth = {}; // key -> smoothed level (exponential)
var _sbOrder = [];  // last-seen order of keys so re-orderings are reflected
function _sbEnsure(key, label) {
  var r = _sbRows[key];
  if (r) return r;
  var row = document.createElement('div'); row.className = 'sb';
  row.innerHTML = '<span class="sb-label">'+label+'</span>'
                + '<span class="sb-track"><span class="sb-bar"></span></span>'
                + '<span class="mute-ind" style="display:none">M</span>';
  r = { row: row, bar: row.children[1].firstChild, mute: row.children[2] };
  _sbRows[key] = r;
  return r;
}
function _sbUpdate(key, label, raw, cls, ducked, muted) {
  var r = _sbEnsure(key, label);
  // Exponential smoothing — fast attack for spikes, slower decay feels natural.
  var prev = _sbSmooth[key] || 0;
  var v = Math.min(Math.max(raw || 0, 0), 100);
  var rising = v > prev;
  var a = rising ? 1.0 : 0.15;
  var s = prev + (v - prev) * a;
  _sbSmooth[key] = s;
  var w = Math.round(s);
  r.bar.className = 'sb-bar ' + (ducked ? 'sb-ducked-bar' : cls);
  // Asymmetric CSS transition: snappy rise (80ms), smooth fall (250ms) so
  // the bar slides continuously between polls rather than stepping.
  r.bar.style.transition = 'width ' + (rising ? '0.08s' : '0.25s') + ' linear';
  r.bar.style.width = w + '%';
  r.mute.style.display = muted ? '' : 'none';
  _sbOrder.push(key);
}
// Dual-lane bars: one track split into green RX (top) + red TX (bottom), no pct label.
var _sbDualRows = {};   // key -> {row, rxBar, txBar, mute}
var _sbDualSmooth = {}; // key -> {rx, tx}
function _sbEnsureDual(key, label) {
  var r = _sbDualRows[key];
  if (r) return r;
  var row = document.createElement('div'); row.className = 'sb';
  row.innerHTML = '<span class="sb-label">'+label+'</span>'
                + '<span class="sb-track" style="position:relative">'
                +   '<span class="sb-bar-rx"></span><span class="sb-bar-tx"></span>'
                + '</span>'
                + '<span class="mute-ind" style="display:none">M</span>';
  r = { row: row, rxBar: row.children[1].children[0], txBar: row.children[1].children[1], mute: row.children[2] };
  _sbDualRows[key] = r;
  return r;
}
function _sbUpdateDual(key, label, rxRaw, txRaw, muted) {
  var r = _sbEnsureDual(key, label);
  var sm = _sbDualSmooth[key] || {rx:0, tx:0};
  var rx = Math.min(Math.max(rxRaw||0,0),100);
  var tx = Math.min(Math.max(txRaw||0,0),100);
  sm.rx = sm.rx + (rx - sm.rx) * (rx > sm.rx ? 1.0 : 0.15);
  sm.tx = sm.tx + (tx - sm.tx) * (tx > sm.tx ? 1.0 : 0.15);
  _sbDualSmooth[key] = sm;
  r.rxBar.style.transition = 'width '+(rx > sm.rx ? '0.08s' : '0.25s')+' linear';
  r.txBar.style.transition = 'width '+(tx > sm.tx ? '0.08s' : '0.25s')+' linear';
  r.rxBar.style.width = Math.round(sm.rx)+'%';
  r.txBar.style.width = Math.round(sm.tx)+'%';
  r.mute.style.display = muted ? '' : 'none';
  _sbOrder.push(key);
}
createPoller('/status', 250, function(s) {
    _sbOrder = [];
    // Dual-lane bars: each full-duplex radio gets its own RX+TX compound bar.
    _sbUpdateDual('aioc', 'AIOC', s.radio_rx, s.radio_tx, false);
    if(s.kv4p_enabled) _sbUpdateDual('kv4p', 'KV4P', s.kv4p_level, s.kv4p_tx_level, s.kv4p_muted);
    // Single-lane bars for RX-only sources and output sinks.
    if(s.sdr1_enabled) _sbUpdate('sdr1', 'SDR1', s.sdr1_level, 'sb-in', s.sdr1_ducked, false);
    if(s.sdr2_enabled) _sbUpdate('sdr2', 'SDR2', s.sdr2_level, 'sb-in', s.sdr2_ducked, false);
    if(s.remote_enabled) _sbUpdate('remote', s.remote_mode, s.remote_level, 'sb-in', s.remote_mode==='CL'&&s.cl_ducked, false);
    if(s.announce_enabled) _sbUpdate('an', 'AN', s.an_level, 'sb-out', false, false);
    if(s.speaker_enabled)  _sbUpdate('sp', 'SP', s.speaker_level, 'sb-loc', false, false);
    if(s.monitor_enabled)  _sbUpdate('mon', 'MON', s.monitor_level, 'sb-in', false, false);
    // Link endpoints (incl. D75) get dual bars — tx_level is already in the status payload.
    if(s.link_enabled && s.link_endpoints) {
      for(var i=0; i<s.link_endpoints.length; i++) {
        var le = s.link_endpoints[i];
        _sbUpdateDual('link_'+le.name, le.name, le.level, le.tx_level, le.rx_muted);
      }
    }
    // Reconcile: remove rows no longer present, append/reorder the rest.
    var container = document.getElementById('shell-bars');
    var want = {}; _sbOrder.forEach(function(k){ want[k] = true; });
    Object.keys(_sbRows).forEach(function(k){
      if (!want[k]) { _sbRows[k].row.remove(); delete _sbRows[k]; delete _sbSmooth[k]; }
    });
    Object.keys(_sbDualRows).forEach(function(k){
      if (!want[k]) { _sbDualRows[k].row.remove(); delete _sbDualRows[k]; delete _sbDualSmooth[k]; }
    });
    for (var i=0; i<_sbOrder.length; i++) {
      var row = (_sbRows[_sbOrder[i]] || _sbDualRows[_sbOrder[i]]).row;
      if (container.children[i] !== row) container.insertBefore(row, container.children[i] || null);
    }
  });

// Grey out nav links for disabled radios
function _updateNav() {
  getJson('/status').then(function(s) {
    var checks = {
      'nav-radio': s.cat_enabled !== false,
      'nav-d75': s.d75_enabled !== false,
      'nav-kv4p': s.kv4p_enabled !== false,
      'nav-sdr': s.sdr1_enabled !== false,
      'nav-gps': s.gps_enabled !== false,
      'nav-repeaters': s.repeater_db_enabled !== false,
      'nav-adsb': s.adsb_enabled !== false,
      'nav-telegram': s.telegram_enabled !== false
    };
    for (var id in checks) {
      var el = document.getElementById(id);
      if (el) {
        if (checks[id]) {
          el.classList.remove('nav-disabled');
        } else {
          el.classList.add('nav-disabled');
        }
      }
    }
  }).catch(function(){});
}
_updateNav();
</script>
