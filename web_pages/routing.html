<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio Routing</title>
<link rel="stylesheet" href="/pages/common.css">
<link rel="stylesheet" href="/pages/drawflow.min.css">
<style>
  body { padding: 0; margin: 0; overflow: hidden; }

  #drawflow {
    width: 100%;
    height: calc(100vh - 36px);
    background: var(--t-bg);
  }

  /* Drawflow theme overrides */
  .drawflow .drawflow-node {
    background: var(--t-panel);
    border: 1px solid var(--t-border);
    border-radius: 5px;
    color: #e0e0e0;
    min-width: 136px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    font-size: 0.61rem;
  }
  .drawflow .drawflow-node.selected {
    border-color: #f39c12 !important;
    box-shadow: 0 0 8px rgba(243,156,18,0.4) !important;
    background: rgba(243,156,18,0.1) !important;
  }
  .drawflow .drawflow-node .title-box {
    padding: 2px 6px;
    border-bottom: 1px solid var(--t-border);
    font-weight: 700;
    font-size: 0.61rem;
  }
  .drawflow .drawflow-node .box {
    padding: 1px 5px 1px;
    font-size: 0.53rem;
    color: #aaa;
  }
  /* Source/sink nodes */
  .drawflow .drawflow-node.source,
  .drawflow .drawflow-node.sink {
    min-width: 157px;
  }
  .drawflow .drawflow-node.source .box,
  .drawflow .drawflow-node.sink .box {
    padding: 1px 5px 1px;
    font-size: 0.49rem;
  }
  .drawflow .drawflow-node.source .title-box,
  .drawflow .drawflow-node.sink .title-box {
    padding: 2px 6px;
    font-size: 0.55rem;
  }
  /* Bus nodes: match source/sink sizing */
  .drawflow .drawflow-node[class*="bus-"] .box {
    padding: 1px 5px 1px;
    font-size: 0.49rem;
  }
  .drawflow .drawflow-node[class*="bus-"] .title-box {
    padding: 2px 6px;
    font-size: 0.55rem;
  }
  .drawflow .drawflow-node[class*="bus-"] .proc-btn {
    width: 14px;
    height: 12px;
    font-size: 0.45rem;
    line-height: 12px;
  }
  .drawflow .drawflow-node[class*="bus-"] .proc-buttons {
    gap: 1px;
    margin-top: 1px;
  }
  .drawflow .drawflow-node[class*="bus-"] .mute-btn {
    width: 14px;
    height: 12px;
    font-size: 0.45rem;
    line-height: 12px;
  }
  .drawflow .connection .main-path {
    stroke: var(--t-accent);
    stroke-width: 3;
  }
  .drawflow .drawflow-node .input, .drawflow .drawflow-node .output {
    background: var(--t-accent);
    border: 2px solid var(--t-accent);
  }
  .drawflow .drawflow-node .input:hover, .drawflow .drawflow-node .output:hover {
    background: #fff;
  }

  /* Node type colors */
  .drawflow .drawflow-node.source .title-box { background: #1a3a2e; border-color: #2ecc71; }
  .drawflow .drawflow-node.bus-listen .title-box { background: #1a2a3e; border-color: #3498db; }
  .drawflow .drawflow-node.bus-solo .title-box { background: #3e2a1a; border-color: #f39c12; }
  .drawflow .drawflow-node.bus-duplex .title-box { background: #1a3a2e; border-color: #2ecc71; }
  .drawflow .drawflow-node.bus-simplex .title-box { background: #3e1a1a; border-color: #e74c3c; }
  .drawflow .drawflow-node.sink .title-box { background: #2a1a3e; border-color: #9b59b6; }

  /* Node controls (mute + gain) */
  .node-controls {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-bottom: 0px;
    padding: 1px 0;
  }
  .mute-btn {
    width: 16px;
    height: 14px;
    border: 1px solid #555;
    border-radius: 2px;
    background: #2a2a3e;
    color: #888;
    font-size: 0.48rem;
    font-weight: bold;
    cursor: pointer;
    padding: 0;
    line-height: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .mute-btn:hover { border-color: #e74c3c; color: #e74c3c; }
  .mute-btn.muted {
    background: #e74c3c;
    color: #fff;
    border-color: #c0392b;
  }
  .gain-slider {
    width: 51px;
    flex-shrink: 0;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #444;
    border-radius: 2px;
    outline: none;
  }
  .gain-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--t-accent);
    cursor: pointer;
  }
  .gain-val {
    font-size: 0.48rem;
    color: #aaa;
    min-width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Processing buttons on bus nodes */
  .proc-buttons {
    display: flex;
    gap: 2px;
    margin-top: 1px;
  }
  .proc-btn {
    width: 16px;
    height: 14px;
    border: 1px solid #555;
    border-radius: 2px;
    background: #2a2a3e;
    color: #666;
    font-size: 0.48rem;
    font-weight: bold;
    cursor: pointer;
    padding: 0;
    text-align: center;
    line-height: 10px;
  }
  .proc-btn:hover { border-color: var(--t-accent); color: var(--t-accent); }
  .proc-btn.on {
    background: var(--t-accent);
    color: #fff;
    border-color: var(--t-accent);
  }
  .proc-btn.out-btn.on {
    background: #2ecc71;
    border-color: #27ae60;
  }

  /* Wider nodes to fit controls */
  .drawflow .drawflow-node { min-width: 119px; }
  .drawflow .drawflow-node[class*="bus-"] { min-width: 178px; }
  .drawflow .drawflow-node .title-box { padding: 1px 4px; font-size: 0.49rem; }
  .drawflow .drawflow-node.source .title-box,
  .drawflow .drawflow-node.sink .title-box { padding: 1px 4px; }

  /* Level bars inside nodes */
  .level-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    margin-top: 1px;
    overflow: hidden;
  }
  .drawflow-node[class*="bus-"] .level-bar {
    height: 3px;
    margin-top: 1px;
  }
  .level-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: #2ecc71;
    transition: width 0.15s;
  }
  .sink .level-fill { background: #f39c12; }
  .drawflow-node[class*="bus-"] .level-fill { background: #3498db; }
  .drawflow-node.node-muted .level-fill { background: #e74c3c !important; }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 8px;
    padding: 6px 12px;
    background: var(--t-panel);
    border-bottom: 1px solid var(--t-border);
    align-items: center;
    font-size: 0.8rem;
  }
  .toolbar button {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--t-btn-border);
    background: var(--t-btn);
    color: #e0e0e0;
    cursor: pointer;
    font-size: 0.78rem;
  }
  .toolbar button:hover { background: var(--t-btn-hover); }
  .toolbar .spacer { flex: 1; }
  .toolbar .status { color: #888; font-size: 0.72rem; }

  /* Delete key hint */
  .hint { color: #555; font-size: 0.65rem; margin-left: 8px; }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="addBusNode('listen')">+ Listen Bus</button>
  <button onclick="addBusNode('solo')">+ Solo Bus</button>
  <button onclick="addBusNode('duplex')">+ Duplex Bus</button>
  <button onclick="addBusNode('simplex')">+ Simplex Bus</button>
  <button onclick="deleteSelected()" style="background:#e74c3c;border-color:#c0392b;">Delete Selected</button>
  <span class="hint">Click a connection to select it, then click Delete Selected (or right-click).</span>
  <span class="spacer"></span>
  <button onclick="autoArrange()">Auto-arrange</button>
  <button onclick="saveRouting()" style="background:#2ecc71;border-color:#27ae60;color:#000;font-weight:bold;">Save</button>
  <button onclick="loadRouting()">Reload</button>
  <span class="status" id="statusBar">Loading...</span>
</div>

<div id="drawflow"></div>

<script src="/pages/drawflow.min.js"></script>
<script src="/pages/dagre.min.js"></script>
<script src="/pages/common.js"></script>
<script>
var editor;
var _state = {};
var _nodeMap = {}; // id -> drawflow node id

function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }

// Initialize Drawflow
var container = document.getElementById('drawflow');
editor = new Drawflow(container);
editor.reroute = true;
editor.start();

// Prevent Drawflow node drag from stealing slider/button interactions
container.addEventListener('mousedown', function(e) {
  if (e.target.closest('.gain-slider, .mute-btn, .proc-btn, button, input')) {
    e.stopPropagation();
  }
}, true);
container.addEventListener('pointerdown', function(e) {
  if (e.target.closest('.gain-slider, .mute-btn, .proc-btn, button, input')) {
    e.stopPropagation();
  }
}, true);

// Auto-arrange: 3-column layout with connection-aware ordering
// Rules:
//  1. Sources left, buses middle, sinks right (fixed columns)
//  2. Connected nodes at top, unconnected at bottom sorted alphabetically
//  3. No wire crossings — nodes ordered to match bus positions
//  4. First source → bus → first sink on same horizontal line
//  5. Additional connected nodes stack below
//  6. Minimum gap between all nodes
function autoArrange() {
  var data = editor.export().drawflow.Home.data;
  var GAP = 12;
  var MARGIN = 15;
  var COL_GAP = 90;

  // ── Step 1: Classify nodes ──
  var sources = [], buses = [], sinks = [];
  var nodeInfo = {}; // nid -> {h, w, name}
  for (var nid in data) {
    var node = data[nid];
    var el = document.querySelector('#node-' + nid);
    var h = el ? el.offsetHeight : 55;
    var w = el ? el.offsetWidth : 140;
    var busNameEl = el ? el.querySelector('.bus-name') : null;
    var displayName = busNameEl ? busNameEl.textContent : (node.name || node.data.id || '');
    var entry = { nid: nid, name: displayName, cls: node.class || '', h: h, w: w };
    nodeInfo[nid] = entry;
    if (entry.cls.indexOf('source') >= 0) sources.push(entry);
    else if (entry.cls.indexOf('bus') >= 0) buses.push(entry);
    else sinks.push(entry);
  }

  // ── Step 2: Build connection maps ──
  var busSourceMap = {}, busSinkMap = {};
  var srcToBus = {}, sinkToBus = {};
  for (var nid in data) {
    var outputs = data[nid].outputs || {};
    for (var okey in outputs) {
      var conns = outputs[okey].connections || [];
      for (var j = 0; j < conns.length; j++) {
        var fromNid = nid, toNid = conns[j].node;
        var fromCls = data[fromNid].class || '';
        var toCls = data[toNid].class || '';
        if (fromCls.indexOf('source') >= 0 && toCls.indexOf('bus') >= 0) {
          if (!busSourceMap[toNid]) busSourceMap[toNid] = [];
          busSourceMap[toNid].push(fromNid);
          srcToBus[fromNid] = toNid;
        } else if (fromCls.indexOf('bus') >= 0 && toCls.indexOf('bus') < 0) {
          if (!busSinkMap[fromNid]) busSinkMap[fromNid] = [];
          busSinkMap[fromNid].push(toNid);
          sinkToBus[toNid] = fromNid;
        }
      }
    }
  }

  // ── Step 3: Split connected/unconnected, sort unconnected alphabetically ──
  var connSources = [], unconnSources = [];
  var connSinks = [], unconnSinks = [];
  for (var i = 0; i < sources.length; i++) {
    if (srcToBus[sources[i].nid]) connSources.push(sources[i]);
    else unconnSources.push(sources[i]);
  }
  for (var i = 0; i < sinks.length; i++) {
    if (sinkToBus[sinks[i].nid]) connSinks.push(sinks[i]);
    else unconnSinks.push(sinks[i]);
  }
  unconnSources.sort(function(a, b) { return a.name.localeCompare(b.name); });
  unconnSinks.sort(function(a, b) { return a.name.localeCompare(b.name); });

  // ── Step 4: Column X positions ──
  var maxSrcW = 0, maxBusW = 0;
  for (var i = 0; i < sources.length; i++) maxSrcW = Math.max(maxSrcW, sources[i].w);
  for (var i = 0; i < buses.length; i++) maxBusW = Math.max(maxBusW, buses[i].w);
  var colSrc = MARGIN;
  var colBus = colSrc + maxSrcW + COL_GAP;
  var colSink = colBus + maxBusW + COL_GAP;

  // ── Step 5: Layout bus groups top-down ──
  // Each bus group: first source, bus, first sink on same Y (straight line)
  // Additional sources/sinks stack below
  var positions = {};
  var curY = MARGIN;  // shared Y cursor across all three columns

  // Sort buses alphabetically by name
  buses.sort(function(a, b) { return a.name.localeCompare(b.name); });

  var placedSrc = {}, placedSink = {};

  for (var bi = 0; bi < buses.length; bi++) {
    var b = buses[bi];
    var bSrcs = busSourceMap[b.nid] || [];
    var bSnks = busSinkMap[b.nid] || [];

    // First row: first source, bus, first sink — all at curY
    var rowY = curY;
    positions[b.nid] = { x: colBus, y: rowY, h: b.h, w: b.w };

    if (bSrcs.length > 0 && nodeInfo[bSrcs[0]]) {
      var s = nodeInfo[bSrcs[0]];
      positions[s.nid] = { x: colSrc, y: rowY, h: s.h, w: s.w };
      placedSrc[s.nid] = true;
    }
    if (bSnks.length > 0 && nodeInfo[bSnks[0]]) {
      var s = nodeInfo[bSnks[0]];
      positions[s.nid] = { x: colSink, y: rowY, h: s.h, w: s.w };
      placedSink[s.nid] = true;
    }

    // Find max height of first row to advance curY
    var rowH = b.h;
    if (bSrcs.length > 0 && nodeInfo[bSrcs[0]]) rowH = Math.max(rowH, nodeInfo[bSrcs[0]].h);
    if (bSnks.length > 0 && nodeInfo[bSnks[0]]) rowH = Math.max(rowH, nodeInfo[bSnks[0]].h);
    curY = rowY + rowH + GAP;

    // Stack additional sources below
    for (var si = 1; si < bSrcs.length; si++) {
      var s = nodeInfo[bSrcs[si]];
      if (s && !placedSrc[s.nid]) {
        positions[s.nid] = { x: colSrc, y: curY, h: s.h, w: s.w };
        placedSrc[s.nid] = true;
        curY = Math.max(curY, curY);
        // Only advance curY if this source row is taller than what's already there
        var nextY = positions[s.nid].y + s.h + GAP;
        if (nextY > curY) curY = nextY;
      }
    }

    // Stack additional sinks below (use separate tracker to not conflict)
    var sinkY = rowY + rowH + GAP;
    for (var si = 1; si < bSnks.length; si++) {
      var s = nodeInfo[bSnks[si]];
      if (s && !placedSink[s.nid]) {
        positions[s.nid] = { x: colSink, y: sinkY, h: s.h, w: s.w };
        placedSink[s.nid] = true;
        sinkY += s.h + GAP;
        if (sinkY > curY) curY = sinkY;
      }
    }

    // Add gap between bus groups
    curY += GAP;
  }

  // ── Step 6: Append unconnected nodes below ──
  // Sources
  for (var i = 0; i < unconnSources.length; i++) {
    var s = unconnSources[i];
    if (!placedSrc[s.nid]) {
      positions[s.nid] = { x: colSrc, y: curY, h: s.h, w: s.w };
      // Don't advance curY for every unconnected — use column-local Y
    }
  }
  // Layout unconnected sources from curY
  var ucSrcY = curY;
  for (var i = 0; i < unconnSources.length; i++) {
    var s = unconnSources[i];
    if (!placedSrc[s.nid]) {
      positions[s.nid] = { x: colSrc, y: ucSrcY, h: s.h, w: s.w };
      ucSrcY += s.h + GAP;
    }
  }
  // Sinks
  var ucSinkY = curY;
  for (var i = 0; i < unconnSinks.length; i++) {
    var s = unconnSinks[i];
    if (!placedSink[s.nid]) {
      positions[s.nid] = { x: colSink, y: ucSinkY, h: s.h, w: s.w };
      ucSinkY += s.h + GAP;
    }
  }

  // ── Step 7: Apply positions to Drawflow ──
  for (var nid in positions) {
    var p = positions[nid];
    var x = Math.round(p.x);
    var y = Math.round(p.y);
    editor.drawflow.drawflow.Home.data[nid].pos_x = x;
    editor.drawflow.drawflow.Home.data[nid].pos_y = y;
    var el = document.querySelector('#node-' + nid);
    if (el) {
      el.style.left = x + 'px';
      el.style.top = y + 'px';
    }
  }

  // Redraw all connections
  for (var nid in data) {
    try { editor.updateConnectionNodes('node-' + nid); } catch(e) {}
  }
  setStatus('Auto-arranged — click Save to keep');
}

// Delete selected connection or node
function deleteSelected() {
  // Try to find a selected connection
  var sel = document.querySelector('.main-path.selected');
  if (sel) {
    var parent = sel.closest('.connection');
    if (parent) {
      var classes = parent.classList;
      // Extract node_out, node_in, output, input from class names
      var nodeOut, nodeIn, outputClass, inputClass;
      for (var i = 0; i < classes.length; i++) {
        if (classes[i].startsWith('node_in_node-')) nodeIn = classes[i].replace('node_in_node-', '');
        if (classes[i].startsWith('node_out_node-')) nodeOut = classes[i].replace('node_out_node-', '');
        if (classes[i].startsWith('output_') && !classes[i].startsWith('node_out')) outputClass = classes[i];
        if (classes[i].startsWith('input_') && !classes[i].startsWith('node_in')) inputClass = classes[i];
      }
      if (nodeOut && nodeIn && outputClass && inputClass) {
        editor.removeSingleConnection(nodeOut, nodeIn, outputClass, inputClass);
        setStatus('Connection removed');
        return;
      }
    }
  }
  // Try selected node
  var selNode = document.querySelector('.drawflow-node.selected');
  if (selNode) {
    var nid = selNode.id.replace('node-', '');
    editor.removeNodeId('node-' + nid);
    setStatus('Node removed');
    return;
  }
  setStatus('Nothing selected — click a connection or node first');
}

// Right-click on connection to delete
container.addEventListener('contextmenu', function(e) {
  var path = e.target.closest('.connection');
  if (path) {
    e.preventDefault();
    // Select then delete
    var mainPath = path.querySelector('.main-path');
    if (mainPath) {
      // Click to select first
      mainPath.classList.add('selected');
      deleteSelected();
    }
  }
});

// Load routing state and populate nodes
function loadRouting() {
  fetch('/routing/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      _state = d;
      rebuildEditor();
      setStatus('Loaded: ' + d.sources.length + ' sources, ' + d.busses.length + ' busses, ' + d.sinks.length + ' sinks');
    })
    .catch(function(e) { setStatus('Error: ' + e.message); });
}

function rebuildEditor() {
  editor.clear();
  _nodeMap = {};

  // Extract saved node positions from layout (if available)
  // Keys are prefixed (src-/bus-/sink-) to avoid collisions when a source
  // and bus share the same id (e.g. "announce" source vs "announce" bus).
  var savedPositions = {};
  if (_state.layout) {
    try {
      var nodes = _state.layout.drawflow.Home.data;
      for (var nid in nodes) {
        var n = nodes[nid];
        var prefix = n.class.indexOf('source') >= 0 ? 'src-'
                   : n.class.indexOf('bus') >= 0 ? 'bus-'
                   : 'sink-';
        savedPositions[prefix + n.name] = {x: n.pos_x, y: n.pos_y};
      }
    } catch(e) {}
  }

  var ySource = 20;
  var yBus = 20;
  var ySink = 20;
  var xSource = 50;
  var xBus = 350;
  var xSink = 650;
  var spacing = 75;

  // Add source nodes (output only — right side)
  for (var i = 0; i < _state.sources.length; i++) {
    var s = _state.sources[i];
    var muted = s.muted ? ' muted' : '';
    var html = '<div class="box">'
      + '<div class="node-controls">'
      + '<button class="mute-btn' + muted + '" onclick="toggleMute(\'' + s.id + '\')" id="mute-' + s.id + '">M</button>'
      + '<input type="range" class="gain-slider" min="0" max="500" value="' + (s.gain || 100) + '" oninput="setGain(\'' + s.id + '\',this.value)" ondblclick="this.value=100;setGain(\'' + s.id + '\',100)" title="Gain (double-click to reset)">'
      + '<span class="gain-val" id="gain-val-' + s.id + '">' + (s.gain || 100) + '%</span>'
      + '</div>'
      + '<div class="level-bar" id="level-' + s.id + '"><div class="level-fill"></div></div>'
      + '</div>';
    var pos = savedPositions['src-' + s.id] || {x: xSource, y: ySource};
    var srcCls = 'source' + (s.muted ? ' node-muted' : '');
    var nodeId = editor.addNode(s.id, 0, 1, pos.x, pos.y, srcCls, {id: s.id}, s.name + '\n' + html);
    _nodeMap['src-' + s.id] = nodeId;
    ySource += spacing;
  }

  // Add bus nodes (input left, output right)
  for (var i = 0; i < _state.busses.length; i++) {
    var b = _state.busses[i];
    var cls = 'bus-' + b.type;
    var proc = b.processing || {};
    var busMuted = b.muted ? ' muted' : '';
    var html = '<div class="box"><div class="proc-buttons">'
      + '<button class="proc-btn' + (proc.gate ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'gate\')" id="proc-' + b.id + '-gate" title="Noise Gate">G</button>'
      + '<button class="proc-btn' + (proc.hpf ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'hpf\')" id="proc-' + b.id + '-hpf" title="High Pass Filter">H</button>'
      + '<button class="proc-btn' + (proc.lpf ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'lpf\')" id="proc-' + b.id + '-lpf" title="Low Pass Filter">L</button>'
      + '<button class="proc-btn' + (proc.notch ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'notch\')" id="proc-' + b.id + '-notch" title="Notch Filter">N</button>'
      + '<span style="margin-left:6px;border-left:1px solid #555;padding-left:6px;"></span>'
      + '<button class="proc-btn out-btn' + (proc.pcm === true ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'pcm\')" id="proc-' + b.id + '-pcm" title="Feed PCM stream">P</button>'
      + '<button class="proc-btn out-btn' + (proc.mp3 === true ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'mp3\')" id="proc-' + b.id + '-mp3" title="Feed MP3 stream">M</button>'
      + '<button class="proc-btn out-btn' + (proc.vad ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'vad\')" id="proc-' + b.id + '-vad" title="VAD gate">V</button>'
      + '<button class="proc-btn out-btn' + (proc.loop ? ' on' : '') + '" onclick="toggleProc(\'' + b.id + '\',\'loop\')" id="proc-' + b.id + '-loop" title="Loop record" style="' + (proc.loop ? 'background:#c0392b;color:#fff' : '') + '">R</button>'
      + '<span style="flex-grow:1;"></span>'
      + '<button class="mute-btn' + busMuted + '" onclick="toggleBusMute(\'' + b.id + '\')" id="bus-mute-' + b.id + '" title="Mute bus">M</button>'
      + '</div>'
      + '<div class="level-bar" id="level-bus_' + b.id + '"><div class="level-fill"></div></div>'
      + '</div>';
    var pos = savedPositions['bus-' + b.id] || {x: xBus, y: yBus};
    var busCls = cls + (b.muted ? ' node-muted' : '');
    var nodeId = editor.addNode(b.id, 1, 1, pos.x, pos.y, busCls, {id: b.id, type: b.type}, '<span class="bus-name" data-bus="' + b.id + '" ondblclick="renameBus(this,\'' + b.id + '\')">' + b.name + '</span> <span style="opacity:0.5;font-weight:400">(' + b.type + ')</span>\n' + html);
    _nodeMap['bus-' + b.id] = nodeId;
    yBus += spacing + 20;
  }

  // Add sink nodes (input only — left side)
  for (var i = 0; i < _state.sinks.length; i++) {
    var s = _state.sinks[i];
    var muted = s.muted ? ' muted' : '';
    var html = '<div class="box">'
      + '<div class="node-controls">'
      + '<button class="mute-btn' + muted + '" onclick="toggleMute(\'' + s.id + '\')" id="mute-' + s.id + '">M</button>'
      + '<input type="range" class="gain-slider" min="0" max="500" value="' + (s.gain || 100) + '" oninput="setGain(\'' + s.id + '\',this.value)" ondblclick="this.value=100;setGain(\'' + s.id + '\',100)" title="Gain (double-click to reset)">'
      + '<span class="gain-val" id="gain-val-' + s.id + '">' + (s.gain || 100) + '%</span>'
      + '</div>'
      + '<div class="level-bar" id="level-' + s.id + '"><div class="level-fill"></div></div>';
    // Speaker mode selector — injected into title-box via JS after node creation
    if (s.id === 'speaker') {
      s._speaker_mode = (s.speaker_mode || 'virtual').toLowerCase();
    }
    html += '</div>';
    var pos = savedPositions['sink-' + s.id] || {x: xSink, y: ySink};
    var sinkCls = 'sink' + (s.muted ? ' node-muted' : '');
    var nodeId = editor.addNode(s.id, 1, 0, pos.x, pos.y, sinkCls, {id: s.id}, s.name + '\n' + html);
    _nodeMap['sink-' + s.id] = nodeId;
    ySink += spacing;
  }

  // Inject speaker mode buttons into title-box (top-right)
  var spkSink = _state.sinks.find(function(s) { return s.id === 'speaker'; });
  if (spkSink) {
    var spkNodeId = _nodeMap['sink-speaker'];
    if (spkNodeId) {
      var spkEl = document.querySelector('#node-' + spkNodeId + ' .title-box');
      if (spkEl) {
        var sm = spkSink._speaker_mode || (spkSink.speaker_mode || 'virtual').toLowerCase();
        spkEl.style.display = 'flex';
        spkEl.style.justifyContent = 'space-between';
        spkEl.style.alignItems = 'center';
        var wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;gap:2px;margin-left:6px;';
        wrap.innerHTML = '<button class="proc-btn' + (sm === 'virtual' ? ' on' : '') + '" onclick="setSpeakerMode(\'virtual\')" id="spk-virtual" title="Virtual (metering only)" style="width:16px;height:13px;font-size:0.5rem;line-height:13px;">V</button>'
          + '<button class="proc-btn' + (sm === 'auto' ? ' on' : '') + '" onclick="setSpeakerMode(\'auto\')" id="spk-auto" title="Auto (try device, fallback virtual)" style="width:16px;height:13px;font-size:0.5rem;line-height:13px;">A</button>'
          + '<button class="proc-btn' + (sm === 'real' ? ' on' : '') + '" onclick="setSpeakerMode(\'real\')" id="spk-real" title="Real (require audio device)" style="width:16px;height:13px;font-size:0.5rem;line-height:13px;">R</button>';
        spkEl.appendChild(wrap);
      }
    }
  }

  // Draw existing connections
  for (var i = 0; i < _state.connections.length; i++) {
    var c = _state.connections[i];
    if (c.type === 'source-bus') {
      var fromNode = _nodeMap['src-' + c.from];
      var toNode = _nodeMap['bus-' + c.to];
      if (fromNode && toNode) {
        try { editor.addConnection(fromNode, toNode, 'output_1', 'input_1'); } catch(e) {}
      }
    } else if (c.type === 'bus-sink') {
      var fromNode = _nodeMap['bus-' + c.from];
      var toNode = _nodeMap['sink-' + c.to];
      if (fromNode && toNode) {
        try { editor.addConnection(fromNode, toNode, 'output_1', 'input_1'); } catch(e) {}
      }
    }
  }
}

// Add a new bus node
function addBusNode(type) {
  var name = prompt('Bus name:');
  if (!name) return;
  fetch('/routing/cmd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: 'add_bus', name: name, type: type})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) loadRouting();
      else alert('Error: ' + (d.error || 'unknown'));
    });
}

// Save current connections to backend
function saveRouting() {
  // Extract connections from Drawflow
  var data = editor.export();
  var connections = [];

  // Build reverse map: drawflow nodeId -> our id
  var reverseMap = {};
  for (var key in _nodeMap) {
    reverseMap[_nodeMap[key]] = key;
  }

  // Walk all nodes and their outputs
  var nodes = data.drawflow.Home.data;
  for (var nodeId in nodes) {
    var node = nodes[nodeId];
    var ourId = reverseMap[parseInt(nodeId)];
    if (!ourId) continue;

    var outputs = node.outputs;
    for (var outKey in outputs) {
      var conns = outputs[outKey].connections;
      for (var j = 0; j < conns.length; j++) {
        var targetNodeId = conns[j].node;
        var targetOurId = reverseMap[parseInt(targetNodeId)];
        if (!targetOurId) continue;

        if (ourId.startsWith('src-') && targetOurId.startsWith('bus-')) {
          connections.push({
            type: 'source-bus',
            from: ourId.substring(4),
            to: targetOurId.substring(4)
          });
        } else if (ourId.startsWith('bus-') && targetOurId.startsWith('sink-')) {
          connections.push({
            type: 'bus-sink',
            from: ourId.substring(4),
            to: targetOurId.substring(5)
          });
        }
      }
    }
  }

  // Also collect bus source/sink lists from connections
  var busUpdates = {};
  for (var i = 0; i < connections.length; i++) {
    var c = connections[i];
    if (c.type === 'source-bus') {
      if (!busUpdates[c.to]) busUpdates[c.to] = {sources: [], sinks: []};
      busUpdates[c.to].sources.push(c.from);
    } else if (c.type === 'bus-sink') {
      if (!busUpdates[c.from]) busUpdates[c.from] = {sources: [], sinks: []};
      busUpdates[c.from].sinks.push(c.to);
    }
  }

  // Save Drawflow layout (node positions)
  var layout = editor.export();

  // Send full state
  fetch('/routing/cmd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: 'save_all', connections: connections, bus_updates: busUpdates, layout: layout})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) setStatus('Saved!');
      else setStatus('Save error: ' + (d.error || 'unknown'));
    });
}

// Validate connections: only source→bus and bus→sink allowed
editor.on('connectionCreated', function(info) {
  var fromNode = editor.drawflow.drawflow.Home.data[info.output_id];
  var toNode = editor.drawflow.drawflow.Home.data[info.input_id];
  if (!fromNode || !toNode) return;
  var fromClass = fromNode.class || '';
  var toClass = toNode.class || '';
  var fromIsBus = fromClass.indexOf('bus') >= 0;
  var toIsBus = toClass.indexOf('bus') >= 0;
  var fromIsSource = fromClass === 'source';
  var toIsSink = toClass === 'sink';
  // Valid: source→bus or bus→sink
  var valid = (fromIsSource && toIsBus) || (fromIsBus && toIsSink);
  if (!valid) {
    setTimeout(function() {
      editor.removeSingleConnection(info.output_id, info.input_id, info.output_class, info.input_class);
    }, 0);
    var msg = fromIsSource && toIsSink ? 'Source must connect through a bus, not directly to a sink'
            : fromIsBus && toIsBus ? 'Cannot connect bus to bus'
            : toIsSource ? 'Cannot connect to a source input'
            : 'Invalid connection';
    setStatus(msg);
  }
});

// Handle node deletion
editor.on('nodeRemoved', function(nodeId) {
  var reverseMap = {};
  for (var key in _nodeMap) reverseMap[_nodeMap[key]] = key;
  var ourId = reverseMap[nodeId];
  if (ourId && ourId.startsWith('bus-')) {
    var busId = ourId.substring(4);
    fetch('/routing/cmd', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd: 'delete_bus', id: busId})
    }).then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) setStatus('Bus removed');
      });
  }
});

loadRouting();

// Mute toggle
function toggleMute(id) {
  fetch('/routing/cmd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: 'mute', id: id})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        var btn = document.getElementById('mute-' + id);
        if (btn) {
          if (d.muted) {
            btn.classList.add('muted');
          } else {
            btn.classList.remove('muted');
          }
          // Toggle red level bar on the parent node
          var node = btn.closest('.drawflow-node');
          if (node) {
            if (d.muted) { node.classList.add('node-muted'); }
            else { node.classList.remove('node-muted'); }
          }
        }
        setStatus(id + ': ' + (d.muted ? 'muted' : 'unmuted'));
      }
    });
}

// Bus mute toggle
function toggleBusMute(busId) {
  fetch('/routing/cmd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: 'bus_mute', bus: busId})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        var btn = document.getElementById('bus-mute-' + busId);
        if (btn) {
          if (d.muted) { btn.classList.add('muted'); }
          else { btn.classList.remove('muted'); }
          var node = btn.closest('.drawflow-node');
          if (node) {
            if (d.muted) { node.classList.add('node-muted'); }
            else { node.classList.remove('node-muted'); }
          }
        }
        setStatus(busId + ': ' + (d.muted ? 'muted' : 'unmuted'));
      }
    });
}

// Gain control
function setGain(id, value) {
  var label = document.getElementById('gain-val-' + id);
  if (label) label.textContent = value + '%';
  // Update slider DOM attribute so drawflow export captures it
  var slider = document.querySelector('.gain-slider[oninput*="' + id + '"]');
  if (slider) slider.setAttribute('value', value);
  // Update drawflow node's stored HTML so save persists the value
  var prefix = id.endsWith('_tx') || id === 'tnc_rx' ? 'sink-' : 'src-';
  // Try both prefixes since we may not know which type
  var dfId = _nodeMap[prefix + id] || _nodeMap['src-' + id] || _nodeMap['sink-' + id];
  if (dfId && editor) {
    try {
      var nodeEl = document.querySelector('#node-' + dfId + ' .drawflow_content_node');
      if (nodeEl) editor.drawflow.drawflow.Home.data[dfId].html = nodeEl.innerHTML;
    } catch(e) {}
  }
  // Debounce — only send after slider stops moving
  clearTimeout(setGain._timer);
  setGain._timer = setTimeout(function() {
    fetch('/routing/cmd', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd: 'gain', id: id, value: parseInt(value)})
    }).then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) setStatus(id + ': gain ' + value + '%');
      });
  }, 200);
}

// Bus rename — double-click bus name for inline edit
function renameBus(el, busId) {
  var current = el.textContent;
  var input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.style.cssText = 'background:var(--t-btn);color:#fff;border:1px solid var(--t-accent);border-radius:3px;padding:2px 6px;font-family:monospace;font-size:0.9em;width:' + Math.max(80, current.length * 9) + 'px;';
  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();
  function commit() {
    var newName = input.value.trim();
    if (!newName || newName === current) { el.textContent = current; return; }
    fetch('/routing/cmd', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd: 'rename_bus', id: busId, name: newName})
    }).then(function(r) { return r.json(); })
      .then(function(d) {
        el.textContent = d.ok ? d.name : current;
        if (d.ok) setStatus('Renamed bus to: ' + d.name);
      }).catch(function() { el.textContent = current; });
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { el.textContent = current; }
  });
}

// Processing toggle
function toggleProc(busId, filter) {
  fetch('/routing/cmd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: 'toggle_proc', bus: busId, filter: filter})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        var btn = document.getElementById('proc-' + busId + '-' + filter);
        if (btn) {
          if (d.state) btn.classList.add('on');
          else btn.classList.remove('on');
        }
        setStatus(busId + ': ' + filter + ' ' + (d.state ? 'ON' : 'OFF'));
      }
    });
}

// Speaker mode selector
function setSpeakerMode(mode) {
  fetch('/routing/cmd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: 'speaker_mode', mode: mode})
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        ['virtual','auto','real'].forEach(function(m) {
          var b = document.getElementById('spk-' + m);
          if (b) { if (m === d.mode) b.classList.add('on'); else b.classList.remove('on'); }
        });
        setStatus('Speaker: ' + d.mode + (d.device ? ' (' + d.device + ')' : ''));
      } else {
        setStatus('Speaker mode error: ' + (d.error || 'unknown'));
      }
    });
}

// Poll audio levels and update bars
function pollLevels() {
  fetch('/routing/levels')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var ptt = d._ptt || {};
      for (var id in d) {
        if (id === '_ptt') continue;
        var el = document.getElementById('level-' + id);
        if (el) {
          var fill = el.querySelector('.level-fill');
          if (fill) fill.style.width = Math.min(100, d[id]) + '%';
        }
        // Also update TX sink bars for radio plugins (e.g. kv4p level → kv4p_tx bar)
        // Skip for sources that have independent TX sinks (remote_audio, mumble)
        if (id !== 'remote_audio' && id !== 'mumble_rx') {
          var txEl = document.getElementById('level-' + id + '_tx');
          if (txEl) {
            var txFill = txEl.querySelector('.level-fill');
            if (txFill) txFill.style.width = Math.min(100, d[id]) + '%';
          }
        }
      }
      // Color TX sink nodes red when PTT is active
      for (var txId in ptt) {
        var node = document.getElementById('level-' + txId);
        if (node) {
          var titleBox = node.closest('.drawflow-node');
          if (titleBox) {
            var tb = titleBox.querySelector('.title-box');
            if (tb) {
              if (ptt[txId]) {
                tb.style.borderColor = '#e74c3c';
                tb.style.background = '#3a1a1a';
              } else {
                tb.style.borderColor = '';
                tb.style.background = '';
              }
            }
          }
        }
      }
    })
    .catch(function() {});
}
setInterval(pollLevels, 200);
