<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gateway Logs</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  /* Full-height flex column — box grows to fill, no calc(100vh-N) fragility. */
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; padding: var(--s-3); }

  .log-toolbar { margin-bottom:var(--s-2); display:flex; gap:var(--s-3);
                 align-items:center; flex-wrap:wrap; flex-shrink:0; }
  .log-toolbar label { color:var(--t-text-dim); font-size:var(--f-sm); }
  .log-filter { background:var(--t-btn); color:var(--t-text);
                border:1px solid var(--t-btn-border); border-radius:var(--r-sm);
                padding:2px var(--s-2); width:200px; font:inherit; font-size:var(--f-sm); }
  .log-filter:focus { border-color:var(--t-accent); outline:none; }
  .log-status { color:var(--t-text-dim); font-size:var(--f-xs); }

  /* Destructive actions — tucked behind a details menu to avoid fat-fingering
     "Reboot Host" while scanning logs. */
  .log-danger { position: relative; margin-left: auto; }
  .log-danger > summary {
    list-style: none; cursor: pointer;
    font-size: var(--f-xs); color: var(--t-text-dim);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px var(--s-2);
    border: 1px solid var(--t-border); border-radius: var(--r-sm);
    background: var(--t-btn);
  }
  .log-danger > summary::-webkit-details-marker { display: none; }
  .log-danger[open] > summary { color: var(--t-accent); border-color: var(--t-accent); }
  .log-danger-menu {
    position: absolute; top: calc(100% + 2px); right: 0;
    background: var(--t-panel); border: 1px solid var(--t-border);
    border-radius: var(--r-sm); padding: var(--s-1);
    display: flex; flex-direction: column; gap: var(--s-1);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6); z-index: 10;
    min-width: 170px;
  }

  .log-box { background:var(--t-bg); border:1px solid var(--t-border);
             border-radius:var(--r-md); padding:var(--s-2);
             flex: 1 1 auto; min-height: 0; overflow-y:auto;
             font-family:inherit; font-size:var(--f-xs); line-height:1.5;
             white-space:pre-wrap; word-break:break-all; color:var(--t-text); }
  /* Desaturated log-line colors — full saturation reserved for alerts elsewhere. */
  .log-box > div.err   { color:var(--t-err-soft); }
  .log-box > div.warn  { color:var(--t-warn-soft); }
  .log-box > div.cat   { color:var(--t-accent); }
</style>
</head>
<body>

<div class="log-toolbar">
  <label><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
  <label>Filter: <input type="text" id="log-filter" placeholder="regex..." class="log-filter"></label>
  <button class="rb rb-sm" onclick="clearLog()">Clear</button>
  <button class="rb rb-sm" id="btn-trace" onclick="toggleTrace('audio')">Audio Trace</button>
  <button class="rb rb-sm" id="btn-watchdog" onclick="toggleTrace('watchdog')">Watchdog Trace</button>
  <span id="log-status" class="log-status"></span>
  <details class="log-danger">
    <summary>Danger &#9662;</summary>
    <div class="log-danger-menu">
      <button class="rb rb-sm rb-warn" id="btn-restart-gw" onclick="restartGateway()">Restart Gateway</button>
      <button class="rb rb-sm rb-danger" id="btn-reboot" onclick="rebootHost()">Reboot Host</button>
    </div>
  </details>
</div>
<div id="log-box" class="log-box"></div>

<script src="/pages/common.js"></script>
<script>
var _seq = 0;

function clearLog() {
  document.getElementById('log-box').innerHTML = '';
}

function setTraceBtn(id, active) {
  var btn = document.getElementById(id);
  btn.classList.toggle('rb-active', active);
}

function toggleTrace(type) {
  fetch('/tracecmd', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'type='+type})
    .then(function(r){ return r.json(); })
    .then(function(d) {
      setTraceBtn(type==='audio'?'btn-trace':'btn-watchdog', !!d.active);
    });
}

function updateTraceButtons() {
  fetch('/tracestatus').then(function(r){ return r.json(); }).then(function(d) {
    setTraceBtn('btn-trace', !!d.audio_trace);
    setTraceBtn('btn-watchdog', !!d.watchdog_trace);
  }).catch(function(){});
}
updateTraceButtons();

function classifyLine(t) {
  if (t.indexOf('error') >= 0 || t.indexOf('Error') >= 0 || t.indexOf('ERROR') >= 0) return 'err';
  if (t.indexOf('Warning') >= 0 || t.indexOf('warning') >= 0) return 'warn';
  if (t.indexOf('[CAT]') >= 0 || t.indexOf('CAT') >= 0) return 'cat';
  return '';
}

function pollLogs() {
  fetch('/logdata?after=' + _seq)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d.seq) _seq = d.seq;
      if (d.lines && d.lines.length > 0) {
        var box = document.getElementById('log-box');
        var filter = document.getElementById('log-filter').value;
        var re = null;
        try { if (filter) re = new RegExp(filter, 'i'); } catch(e) {}
        var frag = document.createDocumentFragment();
        for (var i = 0; i < d.lines.length; i++) {
          if (re && !re.test(d.lines[i])) continue;
          var div = document.createElement('div');
          div.textContent = d.lines[i];
          var cls = classifyLine(d.lines[i]);
          if (cls) div.className = cls;
          frag.appendChild(div);
        }
        box.appendChild(frag);
        while (box.childNodes.length > 5000) box.removeChild(box.firstChild);
        if (document.getElementById('auto-scroll').checked) {
          box.scrollTop = box.scrollHeight;
        }
      }
      document.getElementById('log-status').textContent = d.lines ? d.lines.length + ' new' : '';
      setTimeout(pollLogs, 1000);
    })
    .catch(function() {
      document.getElementById('log-status').textContent = 'offline';
      setTimeout(pollLogs, 3000);
    });
}

function rebootHost() {
  if (!confirm('Reboot the host machine?')) return;
  var btn = document.getElementById('btn-reboot');
  btn.disabled = true;
  btn.textContent = 'Rebooting...';
  fetch('/reboothost', {method:'POST'})
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d.ok) {
        document.getElementById('log-status').textContent = 'Host reboot initiated';
      } else {
        btn.disabled = false;
        btn.textContent = 'Reboot Host';
        alert('Reboot failed: ' + (d.error || 'unknown error'));
      }
    })
    .catch(function() {
      document.getElementById('log-status').textContent = 'Host reboot initiated';
    });
}

function restartGateway() {
  if (!confirm('Restart the radio-gateway service?')) return;
  var btn = document.getElementById('btn-restart-gw');
  btn.disabled = true;
  btn.textContent = 'Restarting...';
  document.getElementById('log-status').textContent = 'Gateway restart requested — reconnecting...';
  fetch('/restartgateway', {method:'POST'}).catch(function(){});
  var _tries = 0;
  var _poll = setInterval(function() {
    _tries++;
    fetch('/logdata?after=0', {cache:'no-store'})
      .then(function(r){ if (r.ok) return r.json(); throw 0; })
      .then(function() {
        clearInterval(_poll);
        document.getElementById('log-status').textContent = 'Gateway back online — reloading...';
        setTimeout(function(){ location.reload(); }, 500);
      })
      .catch(function(){
        if (_tries > 60) {
          clearInterval(_poll);
          btn.disabled = false;
          btn.textContent = 'Restart Gateway';
          document.getElementById('log-status').textContent = 'Gateway still down after 60s — check service status';
        }
      });
  }, 1000);
}

fetch('/logdata?after=0')
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (d.seq) _seq = d.seq;
    if (d.lines) {
      var box = document.getElementById('log-box');
      for (var i = 0; i < d.lines.length; i++) {
        var div = document.createElement('div');
        div.textContent = d.lines[i];
        box.appendChild(div);
      }
      box.scrollTop = box.scrollHeight;
    }
    setTimeout(pollLogs, 1000);
  })
  .catch(function(){ setTimeout(pollLogs, 1000); });
</script>
</body>
</html>
