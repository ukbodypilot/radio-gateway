<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controls</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  #top-section {
    margin-top: var(--s-3);
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-3);
    align-items: flex-start;
  }

  .ctrl-group {
    background: var(--t-panel);
    border: 1px solid var(--t-border);
    border-radius: var(--r-md);
    padding: var(--s-3);
    min-width: 220px;
  }
  .ctrl-group.ctrl-wide { min-width: 260px; flex: 1; }
  .ctrl-group.ctrl-inline { min-width: 0; display: inline-block; }
  .ctrl-group h3 {
    margin: 0 0 var(--s-2);
    color: var(--t-accent);
    font-size: var(--f-sm);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .ctrl-group button {
    padding: var(--s-1) var(--s-3);
    margin: 2px;
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    background: var(--t-btn);
    color: var(--t-text);
    cursor: pointer;
    font-family: inherit;
    font-size: var(--f-xs);
  }
  .ctrl-group button:hover  { background: var(--t-btn-hover); border-color: var(--t-border-hi); }
  .ctrl-group button:active { background: var(--t-btn-active); }
  .ctrl-group button.active {
    background: var(--t-btn-active);
    border-color: var(--t-accent);
    color: var(--t-accent);
  }
  .ctrl-group button.muted {
    background: color-mix(in srgb, var(--t-err) 20%, var(--t-panel));
    border-color: var(--t-err);
    color: var(--t-err);
  }
  .ctrl-group button.dim { opacity: 0.4; }

  .ctrl-input {
    background: var(--t-btn);
    color: var(--t-text);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    padding: var(--s-1) var(--s-2);
    font-family: inherit;
    font-size: var(--f-sm);
  }
  textarea.ctrl-input {
    width: 100%;
    box-sizing: border-box;
    padding: var(--s-2);
    resize: vertical;
  }

  .ctrl-field { display: flex; gap: var(--s-1); align-items: center; }
  .ctrl-field label {
    color: var(--t-text-dim);
    font-size: var(--f-xs);
    white-space: nowrap;
  }
  .ctrl-field label.w4 { width: 4em; }
  .ctrl-field label.w3 { width: 3em; }

  .ctrl-stack { display: flex; flex-direction: column; gap: var(--s-1); }

  .st-line {
    font-size: var(--f-sm);
    color: var(--t-text-dim);
    margin-top: var(--s-2);
    font-variant-numeric: tabular-nums;
  }
  .st-line.working { color: var(--t-warn); }
  .st-line.ok      { color: var(--t-ok); }
  .st-line.err     { color: var(--t-err); }

  /* Playback */
  .pb-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }
  .pb-grid button {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    height: 42px;
    padding: 2px var(--s-1);
    overflow: hidden;
  }
  .pb-key  { font-weight: 700; font-size: var(--f-xs); line-height: 1; }
  .pb-name { font-size: 9px; color: var(--t-text-dim); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1; }
  .smart-row {
    display: flex;
    gap: 3px;
    margin-top: var(--s-2);
  }
  .smart-row button { flex: 1; margin: 0; }

  /* Transmit tabs */
  .tx-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: var(--s-2);
    border-bottom: 1px solid var(--t-border);
    padding-bottom: var(--s-1);
  }
  .tx-tab {
    padding: var(--s-1) var(--s-3);
    border: 1px solid transparent;
    border-radius: var(--r-sm) var(--r-sm) 0 0;
    background: transparent;
    color: var(--t-text-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: var(--f-xs);
    font-weight: 600;
    letter-spacing: 0.05em;
    margin: 0;
  }
  .tx-tab:hover { color: var(--t-text); background: var(--t-btn); border-color: var(--t-border); }
  .tx-tab.active {
    background: var(--t-btn-active);
    border-color: var(--t-accent);
    color: var(--t-accent);
  }
  .tx-pane { display: none; }
  .tx-pane.active { display: block; }

  /* AI options collapsible */
  details.tx-opts { margin-top: var(--s-1); }
  details.tx-opts summary {
    color: var(--t-text-dim);
    font-size: var(--f-xs);
    cursor: pointer;
    user-select: none;
    padding: var(--s-1) 0;
    list-style: none;
  }
  details.tx-opts summary::before { content: '▶ '; }
  details[open].tx-opts summary::before { content: '▼ '; }
  details.tx-opts summary:hover { color: var(--t-text); }
  details.tx-opts .tx-opts-body {
    display: flex;
    flex-direction: column;
    gap: var(--s-1);
    margin-top: var(--s-1);
  }

  /* Link endpoints section */
  #link-section {
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-3);
    margin-top: var(--s-3);
  }
  .link-meta { font-size: var(--f-xs); color: var(--t-text-dim); margin-bottom: var(--s-2); }
  .link-body { display: flex; gap: var(--s-3); align-items: flex-start; }
  .link-ptt {
    width: 80px; height: 50px;
    font-size: var(--f-sm);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    background: var(--t-btn);
    color: var(--t-text);
    cursor: pointer;
  }
  .link-ptt.on {
    background: var(--t-btn-active);
    border-color: var(--t-accent);
    color: var(--t-accent);
  }
  .link-col { flex: 1; display: flex; flex-direction: column; gap: var(--s-1); }
  .link-row { display: flex; align-items: center; gap: var(--s-2); }
  .link-label { color: var(--t-text-dim); width: 2em; text-align: right; font-size: var(--f-xs); }
  .link-bar  { flex: 1; height: 12px; background: var(--t-bg); border: 1px solid var(--t-border); border-radius: var(--r-sm); overflow: hidden; }
  .link-fill { height: 100%; }
  .link-fill.rx { background: var(--t-ok); }
  .link-fill.tx { background: var(--t-err); }
  .link-mute {
    width: 3em; padding: var(--s-1);
    font-size: var(--f-xs);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    background: var(--t-btn);
    color: var(--t-text);
    cursor: pointer;
  }
  .link-mute.on {
    background: color-mix(in srgb, var(--t-err) 20%, var(--t-panel));
    border-color: var(--t-err);
    color: var(--t-err);
  }
  .link-gain-val {
    color: var(--t-text-dim);
    font-size: var(--f-xs);
    width: 3.5em;
    font-variant-numeric: tabular-nums;
  }

  /* Shared helpers */
  .ctrl-field.wrap { flex-wrap: wrap; }
  .ctrl-input.flex-grow { flex: 1; min-width: 0; }
  .ctrl-input.w-voice   { flex: 1; min-width: 90px; }
  .ctrl-input.w-55      { width: 55px; }
  .ctrl-rowset          { display: flex; gap: var(--s-4); flex-wrap: nowrap; }
  .btn-full             { width: 100%; }
  .btn-flex             { flex: 1; }
  .link-row.mt-1        { margin-top: var(--s-1); }
  .link-slider          { flex: 1; }
</style>
</head>
<body>

<div id="top-section">

  <div class="ctrl-group ctrl-inline" id="playback-group">
    <h3>Playback</h3>
    <div class="pb-grid">
      <button onclick="sendKey('1')" id="btn-f1"><span class="pb-key">1</span><span class="pb-name" id="pb-name-1"></span></button>
      <button onclick="sendKey('2')" id="btn-f2"><span class="pb-key">2</span><span class="pb-name" id="pb-name-2"></span></button>
      <button onclick="sendKey('3')" id="btn-f3"><span class="pb-key">3</span><span class="pb-name" id="pb-name-3"></span></button>
      <button onclick="sendKey('4')" id="btn-f4"><span class="pb-key">4</span><span class="pb-name" id="pb-name-4"></span></button>
      <button onclick="sendKey('5')" id="btn-f5"><span class="pb-key">5</span><span class="pb-name" id="pb-name-5"></span></button>
      <button onclick="sendKey('6')" id="btn-f6"><span class="pb-key">6</span><span class="pb-name" id="pb-name-6"></span></button>
      <button onclick="sendKey('7')" id="btn-f7"><span class="pb-key">7</span><span class="pb-name" id="pb-name-7"></span></button>
      <button onclick="sendKey('8')" id="btn-f8"><span class="pb-key">8</span><span class="pb-name" id="pb-name-8"></span></button>
      <button onclick="sendKey('9')" id="btn-f9"><span class="pb-key">9</span><span class="pb-name" id="pb-name-9"></span></button>
      <button onclick="sendKey('0')" id="btn-f0"><span class="pb-key">ID</span><span class="pb-name" id="pb-name-0"></span></button>
      <button onclick="sendKey('-')">Stop</button>
      <button onclick="refreshSounds()" title="Refresh random sounds">&#x21bb;</button>
      <button onclick="toggleTestLoop(this)" id="btn-test-loop" title="Loop audio/loop.mp3">Loop</button>
    </div>
    <div class="smart-row" id="smart-announce-group">
      <button onclick="sendKey('[')">Smart #1</button>
      <button onclick="sendKey(']')">Smart #2</button>
      <button onclick="sendKey(String.fromCharCode(92))">Smart #3</button>
    </div>
    <div id="smart-status" class="st-line" style="margin-top:var(--s-2)"></div>
    <div id="smart-countdowns" class="st-line"></div>
  </div>

  <div class="ctrl-group ctrl-wide" id="transmit-group">
    <div class="tx-tabs">
      <button class="tx-tab active" onclick="switchTab('tts',this)">TTS</button>
      <button class="tx-tab" onclick="switchTab('cw',this)">CW</button>
      <button class="tx-tab" onclick="switchTab('ai',this)">AI</button>
    </div>

    <div id="tx-tts" class="tx-pane active">
      <div class="ctrl-stack">
        <textarea id="tts-text" class="ctrl-input" rows="3" placeholder="Enter text to speak..."></textarea>
        <div class="ctrl-field">
          <select id="tts-voice" class="ctrl-input btn-flex">
            <option value="1">US English</option>
            <option value="2">British</option>
            <option value="3">Australian</option>
            <option value="4">Indian</option>
            <option value="5">South African</option>
            <option value="6">Canadian</option>
            <option value="7">Irish</option>
            <option value="8">French</option>
            <option value="9">German</option>
          </select>
          <button onclick="sendTTS()" id="btn-tts-send" class="btn-flex">Send</button>
        </div>
      </div>
    </div>

    <div id="tx-cw" class="tx-pane">
      <div class="ctrl-stack">
        <textarea id="cw-text" class="ctrl-input" rows="3" placeholder="Enter text for CW..."></textarea>
        <div class="ctrl-field">
          <label class="w3">WPM</label>
          <input id="cw-wpm" class="ctrl-input w-55" type="number" min="5" max="60" value="20">
        </div>
        <div class="ctrl-field">
          <label class="w3">Freq</label>
          <input id="cw-freq" class="ctrl-input w-55" type="number" min="200" max="1200" value="600">
          <label>Hz</label>
        </div>
        <div class="ctrl-field">
          <label class="w3">Vol</label>
          <input id="cw-vol" class="ctrl-input w-55" type="number" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
        <button onclick="sendCW()" id="btn-cw-send" class="btn-full">Send CW</button>
      </div>
    </div>

    <div id="tx-ai" class="tx-pane">
      <div class="ctrl-stack">
        <textarea id="ai-text" class="ctrl-input" rows="3" placeholder="Enter prompt for AI to research and speak..."></textarea>
        <details class="tx-opts">
          <summary>Options</summary>
          <div class="tx-opts-body">
            <div class="ctrl-field">
              <label class="w4">Top text</label>
              <input id="ai-top" class="ctrl-input flex-grow" type="text" value="QST">
            </div>
            <div class="ctrl-field">
              <label class="w4">Tail</label>
              <input id="ai-tail" class="ctrl-input flex-grow" type="text" value="Callsign">
            </div>
            <div class="ctrl-field wrap">
              <label>Secs</label>
              <input id="ai-secs" class="ctrl-input w-55" type="number" value="30" min="5" max="120">
              <label>Voice</label>
              <select id="ai-voice" class="ctrl-input w-voice">
                <option value="1">US English</option>
                <option value="2">British</option>
                <option value="3">Australian</option>
                <option value="4">Indian</option>
                <option value="5">South African</option>
                <option value="6">Canadian</option>
                <option value="7">Irish</option>
                <option value="8">French</option>
                <option value="9">German</option>
              </select>
            </div>
          </div>
        </details>
        <button onclick="sendAIText()" id="btn-ai-send" class="btn-full">Send to AI</button>
      </div>
    </div>

    <div id="tx-status" class="st-line">Ready</div>
  </div>

</div>

<div id="link-section"></div>

<script src="/pages/common.js"></script>
<script>
// ── Tab switching ──
var _activeTab = 'tts';
function switchTab(name, btn) {
  _activeTab = name;
  document.querySelectorAll('.tx-pane').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tx-tab').forEach(function(b) { b.classList.remove('active'); });
  var pane = document.getElementById('tx-' + name);
  if (pane) pane.classList.add('active');
  if (btn) btn.classList.add('active');
  setStatus('tx-status', 'Ready');
}

function setStatus(id, text, cls) {
  var el = document.getElementById(id);
  if (!el) return;
  el.className = 'st-line' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

function toggleTestLoop(btn) {
  postJson('/testloop', {}).then(function(d) {
    if (d.looping) {
      btn.classList.add('muted');
      btn.textContent = 'Stop Loop';
    } else {
      btn.classList.remove('muted');
      btn.textContent = 'Loop';
    }
    if (d.error) alert(d.error);
  });
}

// ── Link endpoint helpers ──
window._lastLinkEndpoints = [];
function linkCmd(endpoint, cmd) {
  cmd.endpoint = endpoint;
  return postJson('/linkcmd', cmd).catch(function(){return {};});
}
window._linkPttState = {};
function linkPttToggle(endpoint) {
  if (window._linkPttState[endpoint] === undefined) {
    var eps = window._lastLinkEndpoints || [];
    for (var i = 0; i < eps.length; i++) {
      if (eps[i].name === endpoint) { window._linkPttState[endpoint] = eps[i].ptt_active; break; }
    }
  }
  var current = window._linkPttState[endpoint] || false;
  var next = !current;
  window._linkPttState[endpoint] = next;
  linkCmd(endpoint, {cmd: 'ptt', state: next});
}
function linkGain(endpoint, cmd, db) {
  linkCmd(endpoint, {cmd: cmd, db: parseInt(db)});
}
function linkMuteToggle(endpoint, dir) {
  postJson('/mixer', {action: 'toggle', source: 'link_' + dir + ':' + endpoint}).catch(function(){});
}

// ── Transmit send functions ──
function sendAIText() {
  var text = document.getElementById('ai-text').value.trim();
  if (!text) return;
  var btn = document.getElementById('btn-ai-send');
  btn.disabled = true;
  setStatus('tx-status', 'Submitted — processing...', 'working');
  var payload = {
    text: text,
    target_secs: parseInt(document.getElementById('ai-secs').value) || 30,
    voice: parseInt(document.getElementById('ai-voice').value) || 1,
    top_text: document.getElementById('ai-top').value.trim(),
    tail_text: document.getElementById('ai-tail').value.trim(),
  };
  postJson('/aitext', payload)
    .then(function(d) {
      if (d.ok) setStatus('tx-status', 'Running — check Smart Announce status', 'ok');
      else      setStatus('tx-status', 'Error: ' + (d.error || 'failed'), 'err');
      btn.disabled = false;
      setTimeout(function(){ setStatus('tx-status', 'Ready'); }, 15000);
    })
    .catch(function(){ setStatus('tx-status', 'Network error', 'err'); btn.disabled = false; });
  if (document.activeElement) document.activeElement.blur();
}

function sendCW() {
  var text = document.getElementById('cw-text').value.trim();
  if (!text) return;
  var btn  = document.getElementById('btn-cw-send');
  var wpm  = parseFloat(document.getElementById('cw-wpm').value)  || 20;
  var freq = parseFloat(document.getElementById('cw-freq').value) || 600;
  var vol  = parseFloat(document.getElementById('cw-vol').value)  || 1.0;
  btn.disabled = true;
  setStatus('tx-status', 'Sending...', 'working');
  postJson('/cw', {text: text, wpm: wpm, freq: freq, vol: vol})
    .then(function(d) {
      if (d.ok) setStatus('tx-status', 'Sent — playing', 'ok');
      else      setStatus('tx-status', 'Error: ' + (d.error || 'failed'), 'err');
      btn.disabled = false;
      setTimeout(function(){ setStatus('tx-status', 'Ready'); }, 5000);
    })
    .catch(function(){ setStatus('tx-status', 'Network error', 'err'); btn.disabled = false; });
  if (document.activeElement) document.activeElement.blur();
}

function sendTTS() {
  var text  = document.getElementById('tts-text').value.trim();
  if (!text) return;
  var voice = document.getElementById('tts-voice').value;
  var btn   = document.getElementById('btn-tts-send');
  btn.disabled = true;
  setStatus('tx-status', 'Generating...', 'working');
  postJson('/tts', {text: text, voice: parseInt(voice)})
    .then(function(d) {
      if (d.ok) setStatus('tx-status', 'Sent — playing', 'ok');
      else      setStatus('tx-status', 'Error: ' + (d.error || 'failed'), 'err');
      btn.disabled = false;
      setTimeout(function(){ setStatus('tx-status', 'Ready'); }, 5000);
    })
    .catch(function(){ setStatus('tx-status', 'Network error', 'err'); btn.disabled = false; });
  if (document.activeElement) document.activeElement.blur();
}

function refreshSounds() {
  postJson('/refreshsounds', {}).then(function(d) {
    if (d.ok) { var n = d.count; alert('Refreshed ' + n + ' sound' + (n != 1 ? 's' : '')); }
  });
}

// ── Status polling ──
createPoller('/status', 1000, function(s) {
  // Smart announce activity
  var smSt = document.getElementById('smart-status');
  if (smSt && s.smart_activity) {
    var parts = [];
    for (var sk in s.smart_activity) {
      if (sk === '0') continue;
      var sv = s.smart_activity[sk];
      var sClr = sv === 'Done' ? 'green' : (sv.startsWith('Error') || sv.startsWith('No ') || sv.startsWith('Dropped')) ? 'red' : 'yellow';
      parts.push('<span class="' + sClr + '">#' + sk + ': ' + sv + '</span>');
    }
    smSt.className = 'st-line';
    smSt.innerHTML = parts.length ? parts.join(' ') : '';
  }
  // Smart announce countdowns
  if (s.smart_countdowns) {
    var cdDiv = document.getElementById('smart-countdowns');
    if (cdDiv) {
      var cdh = '';
      for (var i = 0; i < s.smart_countdowns.length; i++) {
        var sc = s.smart_countdowns[i];
        var scClr = sc.mode === 'manual' ? 'cyan' : 'yellow';
        cdh += '<span class="' + scClr + '">#' + sc.id + ': ' + sc.remaining + '</span> ';
      }
      cdDiv.innerHTML = cdh || '';
    }
  }
  // Playback button states + name fragments
  if (s.files) {
    for (var fk in s.files) {
      var fb = document.getElementById('btn-f' + fk);
      var fn = document.getElementById('pb-name-' + fk);
      var fi = s.files[fk];
      if (fb) {
        fb.classList.toggle('muted', !!fi.playing);
        fb.classList.toggle('dim', !fi.loaded);
        if (fi.name) fb.title = fi.name;
      }
      if (fn) {
        fn.textContent = fi.loaded && fi.name ? fi.name.replace(/\.[^.]+$/, '').substring(0, 11) : '';
      }
    }
  }
  // Show/hide sections
  function showIf(id, cond) { var e = document.getElementById(id); if (e) e.style.display = cond ? '' : 'none'; }
  showIf('playback-group', s.playback_enabled);
  showIf('smart-announce-group', s.smart_announce_enabled);
  showIf('transmit-group', s.tts_enabled);

  // Gateway Link panels — rendered into #link-section
  var linkSection = document.getElementById('link-section');
  if (linkSection && s.link_enabled) {
    var eps = s.link_endpoints || [];
    window._lastLinkEndpoints = eps;
    for (var ei = 0; ei < eps.length; ei++) {
      var le  = eps[ei];
      var eid = 'link-' + le.name.replace(/[^a-zA-Z0-9_-]/g, '_');
      if (!document.getElementById(eid)) {
        var div = document.createElement('div');
        div.className = 'ctrl-group';
        div.id = eid;
        div.style.minWidth = '280px';
        linkSection.appendChild(div);
      }
      var panel = document.getElementById(eid);
      if (!panel) continue;
      var ename   = le.name;
      var connCls = le.connected ? 'green' : 'red';
      var connTxt = le.connected ? 'connected' : 'offline';
      var rxGain  = (le.endpoint_status && le.endpoint_status.rx_gain_db !== undefined) ? le.endpoint_status.rx_gain_db : 0;
      var txGain  = (le.endpoint_status && le.endpoint_status.tx_gain_db !== undefined) ? le.endpoint_status.tx_gain_db : 0;
      var pttCls  = le.ptt_active ? 'link-ptt on' : 'link-ptt';
      var rxmCls  = le.rx_muted  ? 'link-mute on' : 'link-mute';
      var txmCls  = le.tx_muted  ? 'link-mute on' : 'link-mute';
      var h = '<h3>Link: ' + ename + '</h3>';
      h += '<div class="link-meta">' + le.plugin + ' <span class="' + connCls + '">' + connTxt + '</span></div>';
      h += '<div class="link-body">';
      if (le.capabilities && le.capabilities.ptt) {
        h += '<button onclick="linkPttToggle(&quot;' + ename + '&quot;)" class="' + pttCls + '">' + (le.ptt_active ? 'PTT ON' : 'PTT') + '</button>';
      }
      h += '<div class="link-col">';
      h += '<div class="link-row"><span class="link-label">RX</span><div class="link-bar"><div class="link-fill rx" style="width:' + (le.level || 0) + '%"></div></div></div>';
      h += '<div class="link-row"><span class="link-label">TX</span><div class="link-bar"><div class="link-fill tx" style="width:' + (le.tx_level || 0) + '%"></div></div></div>';
      h += '<div class="link-row mt-1">';
      h += '<button onclick="linkMuteToggle(&quot;' + ename + '&quot;,&quot;rx&quot;)" class="' + rxmCls + '">Mute</button>';
      h += '<input type="range" min="-10" max="10" step="1" value="' + rxGain + '" class="link-slider" oninput="linkGain(&quot;' + ename + '&quot;,&quot;rx_gain&quot;,this.value)">';
      h += '<span class="link-gain-val">' + rxGain + ' dB</span>';
      h += '</div>';
      h += '<div class="link-row">';
      h += '<button onclick="linkMuteToggle(&quot;' + ename + '&quot;,&quot;tx&quot;)" class="' + txmCls + '">Mute</button>';
      h += '<input type="range" min="-10" max="10" step="1" value="' + txGain + '" class="link-slider" oninput="linkGain(&quot;' + ename + '&quot;,&quot;tx_gain&quot;,this.value)">';
      h += '<span class="link-gain-val">' + txGain + ' dB</span>';
      h += '</div>';
      h += '</div></div>';
      panel.innerHTML = h;
    }
  }
});
</script>

</html>
