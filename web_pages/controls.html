<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controls</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  /* Controls page — draggable panel grid on top of shared palette. */

  #playback-section {
    margin-top: var(--s-3);
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-3);
    align-items: flex-start;
  }

  .ctrl-group {
    background: var(--t-panel);
    border: 1px solid var(--t-border);
    border-radius: var(--r-md);
    padding: var(--s-3);
    min-width: 220px;
  }
  .ctrl-group.ctrl-wide { min-width: 260px; flex: 1; }
  .ctrl-group.ctrl-inline { min-width: 0; display: inline-block; }
  .ctrl-group h3 {
    margin: 0 0 var(--s-2);
    color: var(--t-accent);
    font-size: var(--f-sm);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Generic panel button (overridden by .rb where used directly) */
  .ctrl-group button {
    padding: var(--s-1) var(--s-3);
    margin: 2px;
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    background: var(--t-btn);
    color: var(--t-text);
    cursor: pointer;
    font-family: inherit;
    font-size: var(--f-xs);
  }
  .ctrl-group button:hover  { background: var(--t-btn-hover); border-color: var(--t-border-hi); }
  .ctrl-group button:active { background: var(--t-btn-active); }
  .ctrl-group button.active {
    background: var(--t-btn-active);
    border-color: var(--t-accent);
    color: var(--t-accent);
  }
  .ctrl-group button.muted {
    background: color-mix(in srgb, var(--t-err) 20%, var(--t-panel));
    border-color: var(--t-err);
    color: var(--t-err);
  }
  .ctrl-group button.dim { opacity: 0.4; }

  /* Shared form controls */
  .ctrl-input {
    background: var(--t-btn);
    color: var(--t-text);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    padding: var(--s-1) var(--s-2);
    font-family: inherit;
    font-size: var(--f-sm);
  }
  textarea.ctrl-input {
    width: 100%;
    box-sizing: border-box;
    padding: var(--s-2);
    resize: vertical;
  }

  /* Row helpers inside a control panel */
  .ctrl-field { display: flex; gap: var(--s-1); align-items: center; }
  .ctrl-field label {
    color: var(--t-text-dim);
    font-size: var(--f-xs);
    white-space: nowrap;
  }
  .ctrl-field label.w4 { width: 4em; }
  .ctrl-field label.w3 { width: 3em; }

  .ctrl-stack { display: flex; flex-direction: column; gap: var(--s-1); }

  /* Status line — color comes from .st-* class, not inline hex. */
  .st-line {
    font-size: var(--f-sm);
    color: var(--t-text-dim);
    margin-top: var(--s-2);
    font-variant-numeric: tabular-nums;
  }
  .st-line.working { color: var(--t-warn); }
  .st-line.ok      { color: var(--t-ok); }
  .st-line.err     { color: var(--t-err); }

  /* Playback slot layout */
  .pb-slot { display: block; margin: 1px 0; white-space: nowrap; }
  .pb-key  { font-weight: 700; display: inline-block; width: 1.5em; }

  /* Playback keypad grid */
  .pb-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .bottom-btns { min-width: 140px; flex: 0 1 160px; }
  .bottom-btns button { width: 100%; box-sizing: border-box; }

  /* Gateway Link panel (dynamically rendered) */
  .link-meta { font-size: var(--f-xs); color: var(--t-text-dim); margin-bottom: var(--s-2); }
  .link-body { display: flex; gap: var(--s-3); align-items: flex-start; }
  .link-ptt {
    width: 80px; height: 50px;
    font-size: var(--f-sm);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    background: var(--t-btn);
    color: var(--t-text);
    cursor: pointer;
  }
  .link-ptt.on {
    background: var(--t-btn-active);
    border-color: var(--t-accent);
    color: var(--t-accent);
  }
  .link-col { flex: 1; display: flex; flex-direction: column; gap: var(--s-1); }
  .link-row { display: flex; align-items: center; gap: var(--s-2); }
  .link-label { color: var(--t-text-dim); width: 2em; text-align: right; font-size: var(--f-xs); }
  .link-bar  { flex: 1; height: 12px; background: var(--t-bg); border: 1px solid var(--t-border); border-radius: var(--r-sm); overflow: hidden; }
  .link-fill { height: 100%; }
  .link-fill.rx { background: var(--t-ok); }
  .link-fill.tx { background: var(--t-err); }
  .link-mute {
    width: 3em; padding: var(--s-1);
    font-size: var(--f-xs);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    background: var(--t-btn);
    color: var(--t-text);
    cursor: pointer;
  }
  .link-mute.on {
    background: color-mix(in srgb, var(--t-err) 20%, var(--t-panel));
    border-color: var(--t-err);
    color: var(--t-err);
  }
  .link-gain-val {
    color: var(--t-text-dim);
    font-size: var(--f-xs);
    width: 3.5em;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<!-- Mute, processing, audio, SDR, and Broadcastify controls removed —
     all handled by routing page (mute buttons, G/H/L/N per bus, gain sliders, P/M toggles) -->

<div id="playback-section">

  <div class="ctrl-group ctrl-inline" id="playback-group">
    <h3>Playback</h3>
    <div style="display:flex; gap:var(--s-4); flex-wrap:nowrap;">
      <div>
        <div class="pb-grid">
          <button onclick="sendKey('1')" id="btn-f1">1</button>
          <button onclick="sendKey('2')" id="btn-f2">2</button>
          <button onclick="sendKey('3')" id="btn-f3">3</button>
          <button onclick="sendKey('4')" id="btn-f4">4</button>
          <button onclick="sendKey('5')" id="btn-f5">5</button>
          <button onclick="sendKey('6')" id="btn-f6">6</button>
          <button onclick="sendKey('7')" id="btn-f7">7</button>
          <button onclick="sendKey('8')" id="btn-f8">8</button>
          <button onclick="sendKey('9')" id="btn-f9">9</button>
          <button onclick="sendKey('0')" id="btn-f0">ID</button>
          <button onclick="sendKey('-')">Stop</button>
          <button onclick="refreshSounds()" title="Refresh random sounds">&#x21bb;</button>
          <button onclick="toggleTestLoop(this)" id="btn-test-loop" title="Loop audio/loop.mp3">Loop</button>
        </div>
      </div>
      <div>
        <div id="playback-status" class="st-line">Loading...</div>
      </div>
    </div>
  </div>

  <div class="ctrl-group bottom-btns" id="smart-announce-group">
    <h3>Smart Announce</h3>
    <div class="ctrl-stack" style="margin-bottom:var(--s-2);">
      <button onclick="sendKey('[')">Smart #1</button>
      <button onclick="sendKey(']')">Smart #2</button>
      <button onclick="sendKey(String.fromCharCode(92))">Smart #3</button>
    </div>
    <div id="smart-status" class="st-line">Idle</div>
  </div>

  <div class="ctrl-group ctrl-wide" id="aitext-group">
    <h3>Text to AI</h3>
    <div class="ctrl-stack">
      <textarea id="ai-text" class="ctrl-input" rows="3" placeholder="Enter prompt for AI to research and speak..."></textarea>
      <div class="ctrl-field">
        <label class="w4">Top text</label>
        <input id="ai-top" class="ctrl-input" type="text" value="QST" style="flex:1; min-width:0;">
      </div>
      <div class="ctrl-field">
        <label class="w4">Tail</label>
        <input id="ai-tail" class="ctrl-input" type="text" value="Callsign" style="flex:1; min-width:0;">
      </div>
      <div class="ctrl-field" style="flex-wrap:wrap;">
        <label>Secs</label>
        <input id="ai-secs" class="ctrl-input" type="number" value="30" min="5" max="120" style="width:55px;">
        <label>Voice</label>
        <select id="ai-voice" class="ctrl-input" style="flex:1; min-width:90px;">
          <option value="1">US English</option>
          <option value="2">British</option>
          <option value="3">Australian</option>
          <option value="4">Indian</option>
          <option value="5">South African</option>
          <option value="6">Canadian</option>
          <option value="7">Irish</option>
          <option value="8">French</option>
          <option value="9">German</option>
        </select>
      </div>
      <button onclick="sendAIText()" id="btn-ai-send" style="width:100%;">Send to AI</button>
    </div>
    <div id="ai-status" class="st-line">Ready</div>
  </div>

  <div class="ctrl-group ctrl-wide" id="cw-group">
    <h3>Text to CW</h3>
    <div class="ctrl-stack">
      <textarea id="cw-text" class="ctrl-input" rows="3" placeholder="Enter text for CW..."></textarea>
      <div class="ctrl-field">
        <label class="w3">WPM</label>
        <input id="cw-wpm" class="ctrl-input" type="number" min="5" max="60" value="20" style="width:55px;">
      </div>
      <div class="ctrl-field">
        <label class="w3">Freq</label>
        <input id="cw-freq" class="ctrl-input" type="number" min="200" max="1200" value="600" style="width:55px;">
        <label>Hz</label>
      </div>
      <div class="ctrl-field">
        <label class="w3">Vol</label>
        <input id="cw-vol" class="ctrl-input" type="number" min="0.1" max="2.0" step="0.1" value="1.0" style="width:55px;">
      </div>
      <button onclick="sendCW()" id="btn-cw-send" style="width:100%;">Send CW</button>
    </div>
    <div id="cw-status" class="st-line">Ready</div>
  </div>

  <div class="ctrl-group ctrl-wide" id="tts-group">
    <h3>Text to Speech</h3>
    <div class="ctrl-stack">
      <textarea id="tts-text" class="ctrl-input" rows="3" placeholder="Enter text to speak..."></textarea>
      <div class="ctrl-field">
        <select id="tts-voice" class="ctrl-input" style="flex:1;">
          <option value="1">US English</option>
          <option value="2">British</option>
          <option value="3">Australian</option>
          <option value="4">Indian</option>
          <option value="5">South African</option>
          <option value="6">Canadian</option>
          <option value="7">Irish</option>
          <option value="8">French</option>
          <option value="9">German</option>
        </select>
        <button onclick="sendTTS()" id="btn-tts-send" style="flex:1;">Send</button>
      </div>
    </div>
    <div id="tts-status" class="st-line">Ready</div>
  </div>

</div>

<script src="/pages/common.js"></script>
<script>
// ── Status line helper — swap class, don't mutate inline style ──
function setStatus(id, text, cls) {
  var el = document.getElementById(id);
  if (!el) return;
  el.className = 'st-line' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

function toggleTestLoop(btn) {
  postJson('/testloop', {}).then(function(d) {
    if (d.looping) {
      btn.classList.add('muted');
      btn.textContent = 'Stop Loop';
    } else {
      btn.classList.remove('muted');
      btn.textContent = 'Loop';
    }
    if (d.error) alert(d.error);
  });
}

window._lastLinkEndpoints = [];
function linkCmd(endpoint, cmd) {
  cmd.endpoint = endpoint;
  return postJson('/linkcmd', cmd).catch(function(){return {};});
}
window._linkPttState = {};
function linkPttToggle(endpoint) {
  if (window._linkPttState[endpoint] === undefined) {
    var eps = window._lastLinkEndpoints || [];
    for(var i=0; i<eps.length; i++) { if(eps[i].name === endpoint) { window._linkPttState[endpoint] = eps[i].ptt_active; break; } }
  }
  var current = window._linkPttState[endpoint] || false;
  var next = !current;
  window._linkPttState[endpoint] = next;
  linkCmd(endpoint, {cmd:'ptt', state:next});
}
function linkGain(endpoint, cmd, db) {
  linkCmd(endpoint, {cmd: cmd, db: parseInt(db)});
}
function linkMuteToggle(endpoint, dir) {
  postJson('/mixer', {action:'toggle', source:'link_'+dir+':'+endpoint}).catch(function(){});
}

function sendAIText() {
  var text = document.getElementById('ai-text').value.trim();
  if (!text) return;
  var btn = document.getElementById('btn-ai-send');
  btn.disabled = true;
  setStatus('ai-status', 'Submitted \u2014 processing...', 'working');
  var payload = {
    text: text,
    target_secs: parseInt(document.getElementById('ai-secs').value) || 30,
    voice: parseInt(document.getElementById('ai-voice').value) || 1,
    top_text: document.getElementById('ai-top').value.trim(),
    tail_text: document.getElementById('ai-tail').value.trim(),
  };
  postJson('/aitext', payload)
    .then(function(d){
      if(d.ok) setStatus('ai-status', 'Running \u2014 check Smart Announce status', 'ok');
      else     setStatus('ai-status', 'Error: ' + (d.error||'failed'), 'err');
      btn.disabled = false;
      setTimeout(function(){ setStatus('ai-status', 'Ready'); }, 15000);
    })
    .catch(function(){ setStatus('ai-status', 'Network error', 'err'); btn.disabled = false; });
  if(document.activeElement) document.activeElement.blur();
}

function sendCW() {
  var text = document.getElementById('cw-text').value.trim();
  if (!text) return;
  var btn = document.getElementById('btn-cw-send');
  var wpm  = parseFloat(document.getElementById('cw-wpm').value)  || 20;
  var freq = parseFloat(document.getElementById('cw-freq').value) || 600;
  var vol  = parseFloat(document.getElementById('cw-vol').value)  || 1.0;
  btn.disabled = true;
  setStatus('cw-status', 'Sending...', 'working');
  postJson('/cw', {text:text, wpm:wpm, freq:freq, vol:vol})
    .then(function(d){
      if(d.ok) setStatus('cw-status', 'Sent \u2014 playing', 'ok');
      else     setStatus('cw-status', 'Error: ' + (d.error||'failed'), 'err');
      btn.disabled = false;
      setTimeout(function(){ setStatus('cw-status', 'Ready'); }, 5000);
    })
    .catch(function(){ setStatus('cw-status', 'Network error', 'err'); btn.disabled = false; });
  if(document.activeElement) document.activeElement.blur();
}

function sendTTS() {
  var text = document.getElementById('tts-text').value.trim();
  if (!text) return;
  var voice = document.getElementById('tts-voice').value;
  var btn = document.getElementById('btn-tts-send');
  btn.disabled = true;
  setStatus('tts-status', 'Generating...', 'working');
  postJson('/tts', {text:text, voice:parseInt(voice)})
    .then(function(d){
      if(d.ok) setStatus('tts-status', 'Sent \u2014 playing', 'ok');
      else     setStatus('tts-status', 'Error: ' + (d.error||'failed'), 'err');
      btn.disabled = false;
      setTimeout(function(){ setStatus('tts-status', 'Ready'); }, 5000);
    })
    .catch(function(){ setStatus('tts-status', 'Network error', 'err'); btn.disabled = false; });
  if(document.activeElement) document.activeElement.blur();
}

function refreshSounds() {
  postJson('/refreshsounds', {}).then(function(d){
    if(d.ok) { var n=d.count; alert('Refreshed ' + n + ' sound' + (n!=1?'s':'')); }
  });
}

// --- Status polling for button states ---
createPoller('/status', 1000, function(s) {
    // Smart announce activity status
    var smSt = document.getElementById('smart-status');
    if(smSt && s.smart_activity) {
      var parts = [];
      for(var sk in s.smart_activity) {
        if(sk === '0') continue;
        var sv = s.smart_activity[sk];
        var sClr = sv==='Done'?'green':sv.startsWith('Error')||sv.startsWith('No ')||sv.startsWith('Dropped')?'red':'yellow';
        parts.push('<span class="'+sClr+'">#'+sk+': '+sv+'</span>');
      }
      smSt.className = 'st-line';
      smSt.innerHTML = parts.length ? parts.join(' ') : 'Idle';
    }
    // Smart announce countdowns
    if(s.smart_countdowns) {
      var cdDiv = document.getElementById('smart-countdowns');
      if(cdDiv) {
        var cdh = '';
        for(var i=0;i<s.smart_countdowns.length;i++) {
          var sc=s.smart_countdowns[i];
          var scClr=sc.mode==='manual'?'cyan':'yellow';
          cdh += '<span class="'+scClr+'">#'+sc.id+': '+sc.remaining+'</span> ';
        }
        cdDiv.innerHTML = cdh || '';
      }
    }
    // Playback file slots
    var pbDiv = document.getElementById('playback-status');
    if(pbDiv && s.files) {
      var ph = '';
      var order = ['1','2','3','4','5','6','7','8','9','0'];
      for(var fi=0;fi<order.length;fi++) {
        var fk = order[fi];
        var f = s.files[fk];
        if(!f || !f.loaded) continue;
        var fClr = f.playing?'red':'green';
        var fName = f.name.length > 28 ? f.name.substring(0,28)+'...' : f.name;
        ph += '<div class="pb-slot"><span class="pb-key '+(f.playing?'red':'cyan')+'">'+(fk==='0'?'ID':fk)+'</span> <span class="'+fClr+'">'+fName+'</span>'+(f.playing?' <span class="red">&#9654; Playing</span>':'')+'</div>';
      }
      pbDiv.innerHTML = ph || '<span class="white">No files loaded</span>';
    }
    // Playback button states — class toggle, never opacity mutation
    if(s.files) {
      for(var fk in s.files) {
        var fb = document.getElementById('btn-f'+fk);
        if(fb) {
          var fi = s.files[fk];
          fb.classList.toggle('muted', !!fi.playing);
          fb.classList.toggle('dim', !fi.loaded);
          if(fi.name) fb.title=fi.name;
        }
      }
    }
    // Hide/show sections based on enabled state
    function showIf(id, cond) { var e=document.getElementById(id); if(e) e.style.display=cond?'':'none'; }
    var hasSDR = s.sdr1_enabled || s.sdr2_enabled;
    showIf('sdr-proc-group', hasSDR);
    showIf('sdr-ctrl-group', hasSDR);
    showIf('playback-group', s.playback_enabled);
    showIf('smart-announce-group', s.smart_announce_enabled);
    showIf('tts-group', s.tts_enabled);
    showIf('btn-s', s.sdr1_enabled);
    showIf('btn-x', s.sdr2_enabled);
    showIf('btn-c', s.remote_enabled);
    showIf('btn-a', s.announce_enabled);
    showIf('btn-o', s.speaker_enabled);
    showIf('btn-j', s.relay_radio_enabled);
    showIf('btn-h', s.relay_charger_enabled);
    // Broadcastify buttons & status text (group is removed but kept in case of future re-add)
    var bcGrp = document.getElementById('broadcastify-group');
    if(bcGrp) {
      if(!s.streaming_enabled) { bcGrp.style.display='none'; } else { bcGrp.style.display=''; }
      var bcSt = document.getElementById('bc-status');
      if(bcSt) {
        var ds = s.darkice_stats || {};
        if(s.darkice_running && ds.connected) {
          var extra = '';
          if(ds.send_rate) extra += ' '+ds.send_rate;
          if(ds.rtt) extra += ' RTT:'+ds.rtt.toFixed(0)+'ms';
          bcSt.innerHTML='<span class="green">&#9679; LIVE'+extra+'</span>';
        } else if(s.darkice_running) {
          bcSt.innerHTML='<span class="yellow">&#9679; Running (no connection)</span>';
        } else {
          bcSt.innerHTML='<span class="red">&#9679; Stopped</span>';
        }
      }
      setBtn('btn-bc-start', s.darkice_running, 'active');
      setBtn('btn-bc-stop', !s.darkice_running && s.streaming_enabled, 'muted');
    }
    // Gateway Link controls — render link endpoint panels into #playback-section
    var pbSection = document.getElementById('playback-section');
    if(pbSection && s.link_enabled) {
      var eps = s.link_endpoints || [];
      window._lastLinkEndpoints = eps;
      for(var ei=0; ei<eps.length; ei++) {
        var le = eps[ei];
        var eid = 'link-' + le.name.replace(/[^a-zA-Z0-9_-]/g, '_');
        var existing = document.getElementById(eid);
        if(!existing) {
          var div = document.createElement('div');
          div.className = 'ctrl-group';
          div.id = eid;
          div.style.minWidth = '280px';
          div.setAttribute('draggable', 'true');
          div.style.cursor = 'grab';
          pbSection.appendChild(div);
        }
        var panel = document.getElementById(eid);
        if(!panel) continue;
        var ename = le.name;
        var connCls = le.connected ? 'green' : 'red';
        var connTxt = le.connected ? 'connected' : 'offline';
        var rxGain = (le.endpoint_status && le.endpoint_status.rx_gain_db !== undefined) ? le.endpoint_status.rx_gain_db : 0;
        var txGain = (le.endpoint_status && le.endpoint_status.tx_gain_db !== undefined) ? le.endpoint_status.tx_gain_db : 0;
        var pttCls = le.ptt_active ? 'link-ptt on' : 'link-ptt';
        var rxmCls = le.rx_muted ? 'link-mute on' : 'link-mute';
        var txmCls = le.tx_muted ? 'link-mute on' : 'link-mute';
        var h = '<h3>Link: '+ename+'</h3>';
        h += '<div class="link-meta">'+le.plugin+' <span class="'+connCls+'">'+connTxt+'</span></div>';
        h += '<div class="link-body">';
        if(le.capabilities && le.capabilities.ptt) {
          h += '<button onclick="linkPttToggle(&quot;'+ename+'&quot;)" class="'+pttCls+'">'+(le.ptt_active?'PTT ON':'PTT')+'</button>';
        }
        h += '<div class="link-col">';
        h += '<div class="link-row"><span class="link-label">RX</span><div class="link-bar"><div class="link-fill rx" style="width:'+(le.level||0)+'%"></div></div></div>';
        h += '<div class="link-row"><span class="link-label">TX</span><div class="link-bar"><div class="link-fill tx" style="width:'+(le.tx_level||0)+'%"></div></div></div>';
        h += '<div class="link-row" style="margin-top:var(--s-1);">';
        h += '<button onclick="linkMuteToggle(&quot;'+ename+'&quot;,&quot;rx&quot;)" class="'+rxmCls+'">Mute</button>';
        h += '<input type="range" min="-10" max="10" step="1" value="'+rxGain+'" style="flex:1;" oninput="linkGain(&quot;'+ename+'&quot;,&quot;rx_gain&quot;,this.value)">';
        h += '<span class="link-gain-val">'+rxGain+' dB</span>';
        h += '</div>';
        h += '<div class="link-row">';
        h += '<button onclick="linkMuteToggle(&quot;'+ename+'&quot;,&quot;tx&quot;)" class="'+txmCls+'">Mute</button>';
        h += '<input type="range" min="-10" max="10" step="1" value="'+txGain+'" style="flex:1;" oninput="linkGain(&quot;'+ename+'&quot;,&quot;tx_gain&quot;,this.value)">';
        h += '<span class="link-gain-val">'+txGain+' dB</span>';
        h += '</div>';
        h += '</div></div>';
        panel.innerHTML = h;
      }
    }
  });

// ── Drag-to-reorder panels with localStorage persistence ──
(function() {
  var container = document.getElementById('playback-section');
  if (!container) return;
  var STORAGE_KEY = 'controls_panel_order';

  function initDrag() {
    var panels = container.querySelectorAll('.ctrl-group[id]');
    panels.forEach(function(p) {
      p.setAttribute('draggable', 'true');
      p.style.cursor = 'grab';
    });
  }

  var dragSrc = null;

  container.addEventListener('dragstart', function(e) {
    var panel = e.target.closest('.ctrl-group[id]');
    if (!panel) return;
    dragSrc = panel;
    panel.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', panel.id);
  });

  container.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var target = e.target.closest('.ctrl-group[id]');
    if (!target || target === dragSrc) return;
    var panels = Array.from(container.querySelectorAll('.ctrl-group[id]'));
    var dragIdx = panels.indexOf(dragSrc);
    var targetIdx = panels.indexOf(target);
    if (dragIdx < targetIdx) {
      container.insertBefore(dragSrc, target.nextSibling);
    } else {
      container.insertBefore(dragSrc, target);
    }
  });

  container.addEventListener('dragend', function() {
    if (dragSrc) dragSrc.style.opacity = '';
    dragSrc = null;
    saveOrder();
  });

  function saveOrder() {
    var panels = container.querySelectorAll('.ctrl-group[id]');
    var order = [];
    panels.forEach(function(p) { order.push(p.id); });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(order)); } catch(e) {}
  }

  function restoreOrder() {
    try {
      var order = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!order || !Array.isArray(order)) return;
      for (var i = 0; i < order.length; i++) {
        var el = document.getElementById(order[i]);
        if (el && el.parentNode === container) container.appendChild(el);
      }
    } catch(e) {}
  }

  restoreOrder();
  initDrag();
})();
</script>
