<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recordings</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  .rec-toolbar { display:flex; gap:var(--s-3); flex-wrap:wrap;
                 align-items:flex-end; margin-bottom:var(--s-3); }
  .rec-toolbar label { color:var(--t-text-dim); font-size:var(--f-xs); display:block; }
  .rec-toolbar select { background:var(--t-btn); color:var(--t-text);
                        border:1px solid var(--t-btn-border);
                        border-radius:var(--r-sm); padding:var(--s-1) var(--s-2);
                        font:inherit; font-size:var(--f-sm); margin-top:var(--s-1); }
  .rec-toolbar select:focus { border-color:var(--t-accent); outline:none; }
  .rec-actions { margin-left:auto; display:flex; gap:var(--s-1); flex-wrap:wrap; }

  .rec-summary { color:var(--t-text-dim); font-size:var(--f-sm);
                 margin-bottom:var(--s-2); }

  .rec-tbl-wrap { background:var(--t-panel); border:1px solid var(--t-border);
                  border-radius:var(--r-md); overflow:hidden; }
  .rec-tbl { width:100%; border-collapse:collapse; font:inherit;
             font-size:var(--f-sm); }
  .rec-tbl thead tr { background:var(--t-bg); text-align:left; }
  .rec-tbl th { padding:var(--s-2) var(--s-3); font-weight:600;
                color:var(--t-text-dim); font-size:var(--f-xs);
                letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; }
  .rec-tbl th.check { width:30px; cursor:default; }
  .rec-tbl td { padding:var(--s-1) var(--s-3); border-top:1px solid var(--t-border);
                color:var(--t-text); }
  .rec-tbl tbody tr:hover { background:var(--t-panel-hi); }
  .rec-tbl tbody tr.playing { background:color-mix(in srgb, var(--t-ok) 15%, transparent); }
  .rec-radio { color:var(--t-accent); }
  .rec-freq  { color:var(--t-warn); }
  .rec-size  { text-align:right; color:var(--t-text-dim); }

  .rec-empty { display:none; text-align:center; color:var(--t-text-dim);
               padding:40px; font-size:var(--f-md); }

  .player-bar { display:none; position:fixed; bottom:0; left:0; right:0;
                background:var(--t-panel); border-top:1px solid var(--t-accent);
                padding:var(--s-2) var(--s-4); z-index:999; font:inherit; }
  .player-row { display:flex; align-items:center; gap:var(--s-3); }
  .player-time { color:var(--t-text); min-width:100px; font-size:var(--f-sm); }
  .player-seek { flex:1; cursor:pointer; }
  .player-name { color:var(--t-accent); font-size:var(--f-sm);
                 max-width:300px; overflow:hidden;
                 text-overflow:ellipsis; white-space:nowrap; }
  .player-vol-label { color:var(--t-text-dim); font-size:var(--f-xs); }
  .player-vol { width:80px; }
</style>
</head>
<body>

<div class="rec-toolbar">
  <div>
    <label>Radio</label>
    <select id="f-radio" onchange="applyFilter()"><option value="">All</option></select>
  </div>
  <div>
    <label>Date</label>
    <select id="f-date" onchange="applyFilter()"><option value="">All</option></select>
  </div>
  <div>
    <label>Frequency</label>
    <select id="f-freq" onchange="applyFilter()"><option value="">All</option></select>
  </div>
  <div class="rec-actions">
    <button onclick="selectAll()" class="rb rb-sm">Select All</button>
    <button onclick="selectNone()" class="rb rb-sm">Select None</button>
    <button onclick="downloadSelected()" class="rb rb-sm rb-primary">Download Selected</button>
    <button onclick="deleteSelected()" class="rb rb-sm rb-danger">Delete Selected</button>
    <button onclick="if(confirm('Delete ALL recordings?'))deleteAll()" class="rb rb-sm rb-danger">Delete All</button>
  </div>
</div>

<div id="rec-summary" class="rec-summary"></div>

<div class="rec-tbl-wrap">
  <table id="rec-table" class="rec-tbl">
    <thead>
      <tr>
        <th class="check"><input type="checkbox" id="check-all" onchange="toggleAll(this.checked)"></th>
        <th onclick="sortBy('name')">Filename</th>
        <th onclick="sortBy('radio')">Radio</th>
        <th onclick="sortBy('freq')">Freq</th>
        <th onclick="sortBy('date')">Date</th>
        <th onclick="sortBy('time')">Time</th>
        <th onclick="sortBy('size')">Size</th>
        <th>Play</th>
      </tr>
    </thead>
    <tbody id="rec-body"></tbody>
  </table>
</div>
<div id="rec-empty" class="rec-empty">No recordings found</div>

<div id="player-bar" class="player-bar">
  <div class="player-row">
    <button onclick="playerPause()" id="pp-btn" class="rb rb-sm" style="min-width:50px;">Pause</button>
    <button onclick="playerStop()" class="rb rb-sm rb-danger">Stop</button>
    <span id="player-time" class="player-time">0:00 / 0:00</span>
    <input type="range" id="player-seek" class="player-seek" min="0" max="1000" value="0" step="1">
    <span class="player-vol-label">Vol</span>
    <input type="range" id="player-vol" class="player-vol" min="0" max="100" value="100" oninput="playerVol(this.value)">
    <span id="player-name" class="player-name"></span>
  </div>
  <audio id="audio-player"></audio>
</div>

<script src="/pages/common.js"></script>
<script>
var _allFiles = [], _filtered = [], _sortKey = 'name', _sortAsc = false, _playingFile = '';

function loadFiles() {
  fetch('/recordingslist').then(function(r){return r.json();}).then(function(files) {
    _allFiles = files;
    buildFilters();
    applyFilter();
  });
}

function buildFilters() {
  var radios = {}, dates = {}, freqs = {};
  _allFiles.forEach(function(f) {
    if (f.radio) radios[f.radio] = 1;
    if (f.date) dates[f.date] = 1;
    if (f.freq) freqs[f.freq] = 1;
  });
  fillSelect('f-radio', Object.keys(radios).sort());
  fillSelect('f-date', Object.keys(dates).sort().reverse());
  fillSelect('f-freq', Object.keys(freqs).sort());
}

function fillSelect(id, vals) {
  var sel = document.getElementById(id);
  var cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  vals.forEach(function(v) {
    var o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
  sel.value = cur;
}

function applyFilter() {
  var r = document.getElementById('f-radio').value;
  var d = document.getElementById('f-date').value;
  var q = document.getElementById('f-freq').value;
  _filtered = _allFiles.filter(function(f) {
    if (r && f.radio !== r) return false;
    if (d && f.date !== d) return false;
    if (q && f.freq !== q) return false;
    return true;
  });
  doSort();
  render();
}

function sortBy(key) {
  if (_sortKey === key) _sortAsc = !_sortAsc;
  else { _sortKey = key; _sortAsc = true; }
  doSort();
  render();
}

function doSort() {
  _filtered.sort(function(a, b) {
    var va = a[_sortKey] || '', vb = b[_sortKey] || '';
    if (_sortKey === 'size') { va = a.size; vb = b.size; }
    if (va < vb) return _sortAsc ? -1 : 1;
    if (va > vb) return _sortAsc ? 1 : -1;
    return 0;
  });
}

function render() {
  var tbody = document.getElementById('rec-body');
  var empty = document.getElementById('rec-empty');
  var summary = document.getElementById('rec-summary');
  if (!_filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    summary.textContent = _allFiles.length ? 'No files match filter' : 'No recordings';
    return;
  }
  empty.style.display = 'none';
  var totalSize = 0;
  _filtered.forEach(function(f) { totalSize += f.size; });
  summary.textContent = _filtered.length + ' file' + (_filtered.length !== 1 ? 's' : '') +
    ' (' + fmtSize(totalSize) + ')' +
    (_filtered.length < _allFiles.length ? ' of ' + _allFiles.length + ' total' : '');

  var h = '';
  _filtered.forEach(function(f) {
    var isPlaying = (_playingFile === f.name);
    h += '<tr class="' + (isPlaying ? 'playing' : '') + '">';
    h += '<td><input type="checkbox" class="f-check" data-name="' + f.name + '"></td>';
    h += '<td>' + f.name + '</td>';
    h += '<td class="rec-radio">' + f.radio + '</td>';
    h += '<td class="rec-freq">' + f.freq + '</td>';
    h += '<td>' + f.date + '</td>';
    h += '<td>' + f.time + '</td>';
    h += '<td class="rec-size">' + fmtSize(f.size) + '</td>';
    h += '<td>';
    if (f.ext === 'mp3' || f.ext === 'wav') {
      if (isPlaying) {
        h += '<button onclick="stopPlay()" class="rb rb-sm rb-danger">Stop</button>';
      } else {
        h += '<button onclick="playFile(\'' + f.name + '\')" class="rb rb-sm">Play</button>';
      }
    }
    h += '</td></tr>';
  });
  tbody.innerHTML = h;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function toggleAll(checked) {
  document.querySelectorAll('.f-check').forEach(function(c) { c.checked = checked; });
}
function selectAll() { toggleAll(true); document.getElementById('check-all').checked = true; }
function selectNone() { toggleAll(false); document.getElementById('check-all').checked = false; }

function getSelected() {
  var sel = [];
  document.querySelectorAll('.f-check:checked').forEach(function(c) { sel.push(c.dataset.name); });
  return sel;
}

function downloadSelected() {
  var sel = getSelected();
  if (!sel.length) { alert('No files selected'); return; }
  sel.forEach(function(fname) {
    var a = document.createElement('a');
    a.href = '/recordingsdownload?file=' + encodeURIComponent(fname);
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
}

function deleteSelected() {
  var sel = getSelected();
  if (!sel.length) { alert('No files selected'); return; }
  if (!confirm('Delete ' + sel.length + ' file(s)?')) return;
  postJson('/recordingsdelete', {files:sel}).then(function() { loadFiles(); });
}

function deleteAll() {
  postJson('/recordingsdelete', {delete_all:true}).then(function() { loadFiles(); });
}

function playFile(fname) {
  var player = document.getElementById('audio-player');
  var bar = document.getElementById('player-bar');
  player.src = '/recordingsdownload?file=' + encodeURIComponent(fname);
  player.play();
  _playingFile = fname;
  bar.style.display = '';
  document.getElementById('player-name').textContent = fname;
  document.getElementById('pp-btn').textContent = 'Pause';
  render();
  player.onended = function() { playerStop(); };
}

function playerPause() {
  var player = document.getElementById('audio-player');
  if (player.paused) {
    player.play();
    document.getElementById('pp-btn').textContent = 'Pause';
  } else {
    player.pause();
    document.getElementById('pp-btn').textContent = 'Play';
  }
}

function playerStop() {
  var player = document.getElementById('audio-player');
  player.pause();
  player.src = '';
  _playingFile = '';
  document.getElementById('player-bar').style.display = 'none';
  render();
}

function playerVol(val) {
  document.getElementById('audio-player').volume = val / 100;
}

(function() {
  var player = document.getElementById('audio-player');
  var seek = document.getElementById('player-seek');
  var dragging = false;

  player.addEventListener('timeupdate', function() {
    if (dragging) return;
    if (player.duration) seek.value = (player.currentTime / player.duration) * 1000;
    document.getElementById('player-time').textContent = fmtDuration(player.currentTime) + ' / ' + fmtDuration(player.duration);
  });

  seek.addEventListener('mousedown', function() { dragging = true; });
  seek.addEventListener('touchstart', function() { dragging = true; });
  seek.addEventListener('mouseup', function() {
    if (player.duration) player.currentTime = player.duration * seek.value / 1000;
    dragging = false;
  });
  seek.addEventListener('touchend', function() {
    if (player.duration) player.currentTime = player.duration * seek.value / 1000;
    dragging = false;
  });
  seek.addEventListener('change', function() {
    if (player.duration) player.currentTime = player.duration * seek.value / 1000;
    dragging = false;
  });
})();

loadFiles();
setInterval(loadFiles, 10000);
</script>

</body>
</html>
