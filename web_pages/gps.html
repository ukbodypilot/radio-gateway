<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GPS</title>
<link rel="stylesheet" href="/pages/common.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .gps-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--s-3); margin-bottom:var(--s-3); }
  @media (max-width: 800px) { .gps-grid { grid-template-columns:1fr; } }
  .gps-big { color:var(--t-ok); font-size:var(--f-xl); text-align:center;
             letter-spacing:0.04em; margin:var(--s-1) 0; font-weight:700; }
  .gps-label { color:var(--t-text-dim); font-size:var(--f-xs); }
  .gps-val   { color:var(--t-text); font-weight:600; }
  .gps-row   { display:flex; align-items:center; gap:var(--s-3);
               margin:var(--s-1) 0; flex-wrap:wrap; }
  .gps-input { background:var(--t-btn); border:1px solid var(--t-btn-border);
               color:var(--t-ok); padding:var(--s-1) var(--s-2);
               border-radius:var(--r-sm); font:inherit; font-size:var(--f-sm);
               width:120px; text-align:center; }
  .gps-input:focus { border-color:var(--t-accent); outline:none; }

  #gps-map { height:400px; border-radius:var(--r-md); border:1px solid var(--t-border); }
  .gps-dot {
    width:14px; height:14px; border-radius:50%;
    background:var(--t-accent); border:2px solid var(--t-text);
    box-shadow:0 0 6px color-mix(in srgb, var(--t-accent) 70%, transparent);
    animation:gps-pulse 2s ease-in-out infinite;
  }
  @keyframes gps-pulse {
    0%,100% { box-shadow:0 0 4px color-mix(in srgb, var(--t-accent) 50%, transparent); }
    50%     { box-shadow:0 0 12px color-mix(in srgb, var(--t-accent) 90%, transparent); }
  }

  .sat-bar   { display:flex; align-items:center; gap:var(--s-1); margin:2px 0; }
  .sat-prn   { min-width:42px; text-align:right; color:var(--t-text-dim); font-size:var(--f-xs); }
  .sat-track { flex:1; background:var(--t-bg); border:1px solid var(--t-border);
               border-radius:var(--r-sm); height:14px; overflow:hidden; }
  .sat-fill  { height:100%; transition:width 0.5s, background 0.2s; background:var(--t-ok); }
  .sat-fill.warn { background:var(--t-warn); }
  .sat-fill.err  { background:var(--t-err); }
  .sat-fill.mute { background:var(--t-text-mute); }
  .sat-snr   { min-width:28px; font-size:var(--f-xs); color:var(--t-text); }

  .gps-fix-badge { font-weight:600; font-size:var(--f-xs); }
  .gps-fix-badge.ok   { color:var(--t-ok); }
  .gps-fix-badge.err  { color:var(--t-err); }
  .gps-fix-badge.warn { color:var(--t-warn); }
  .gps-fix-badge .sim { color:var(--t-warn); margin-left:var(--s-1); }

  .gps-mode-btn { font-size:var(--f-xs); padding:var(--s-1) var(--s-2);
                  background:var(--t-btn); border:1px solid var(--t-border);
                  color:var(--t-text); border-radius:var(--r-sm); cursor:pointer;
                  font:inherit; font-weight:600; letter-spacing:0.06em;
                  transition:border-color 0.12s, color 0.12s; }
  .gps-mode-btn.sim  { color:var(--t-warn); border-color:var(--t-warn); }
  .gps-mode-btn.live { color:var(--t-ok); border-color:var(--t-ok); }
  .gps-mode-btn.err  { color:var(--t-err); border-color:var(--t-err); }

  .panel-title-accent { color:var(--t-accent); font-weight:700;
                        font-size:var(--f-sm); letter-spacing:0.06em;
                        text-transform:uppercase; }
  .sim-hint { color:var(--t-warn); font-size:var(--f-xs); margin-left:var(--s-2); }
</style>
</head><body>

<div class="gps-grid">
  <div>
    <div class="panel" style="padding:0; overflow:hidden;">
      <div id="gps-map"></div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--s-2);">
        <span class="panel-title-accent">Position</span>
        <div style="display:flex; align-items:center; gap:var(--s-2);">
          <button class="gps-mode-btn" id="gps-mode-btn" onclick="toggleMode()" title="Switch between simulated and real GPS">SIM</button>
          <span id="gps-fix-badge" class="gps-fix-badge"></span>
        </div>
      </div>
      <div class="gps-big" id="gps-pos">-- / --</div>
      <div class="gps-row" style="justify-content:center; gap:var(--s-5); margin-top:var(--s-2);">
        <div><span class="gps-label">Alt:</span> <span class="gps-val" id="gps-alt">--</span> <span class="gps-label">m</span></div>
        <div><span class="gps-label">Speed:</span> <span class="gps-val" id="gps-speed">--</span> <span class="gps-label">km/h</span></div>
        <div><span class="gps-label">Hdg:</span> <span class="gps-val" id="gps-hdg">--</span><span class="gps-label">&deg;</span></div>
      </div>
      <div class="gps-row" style="justify-content:center; gap:var(--s-5); margin-top:var(--s-1);">
        <div><span class="gps-label">HDOP:</span> <span class="gps-val" id="gps-hdop">--</span></div>
        <div><span class="gps-label">Sats:</span> <span class="gps-val" id="gps-sats">--</span></div>
        <div><span class="gps-label">Fix:</span> <span class="gps-val" id="gps-fix-time">--</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title-accent" style="margin-bottom:var(--s-1);">Satellites in View</div>
      <div id="gps-sat-chart" style="max-height:280px; overflow-y:auto;">
        <span class="gps-label">Waiting for data...</span>
      </div>
    </div>
  </div>
</div>

<div id="gps-sim-panel" class="panel" style="display:none;">
  <div class="panel-title-accent" style="margin-bottom:var(--s-2);">Simulation Controls
    <span class="sim-hint">(click map to set position)</span>
  </div>
  <div class="gps-row">
    <span class="gps-label">Lat:</span>
    <input id="sim-lat" class="gps-input" type="text" value="33.7455">
    <span class="gps-label">Lon:</span>
    <input id="sim-lon" class="gps-input" type="text" value="-117.8677">
    <span class="gps-label">Alt (m):</span>
    <input id="sim-alt" class="gps-input" type="text" value="35" style="width:70px;">
    <span class="gps-label">Speed:</span>
    <input id="sim-speed" class="gps-input" type="text" value="0" style="width:60px;">
    <span class="gps-label">Hdg:</span>
    <input id="sim-hdg" class="gps-input" type="text" value="0" style="width:60px;">
    <button class="rb rb-sm" onclick="simSet()">Set</button>
  </div>
</div>

<script>
var _map = L.map('gps-map').setView([33.7455, -117.8677], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap', maxZoom: 19
}).addTo(_map);

var ACCENT = getComputedStyle(document.documentElement).getPropertyValue('--t-accent').trim() || '#4fd6e6';
var OK     = getComputedStyle(document.documentElement).getPropertyValue('--t-ok').trim()     || '#5dc47a';
var WARN   = getComputedStyle(document.documentElement).getPropertyValue('--t-warn').trim()   || '#e89d3c';
var ERR    = getComputedStyle(document.documentElement).getPropertyValue('--t-err').trim()    || '#e04848';

var _dotIcon = L.divIcon({className: '', html: '<div class="gps-dot"></div>', iconSize: [14, 14], iconAnchor: [7, 7]});
var _marker = L.marker([33.7455, -117.8677], {icon: _dotIcon, zIndexOffset: 1000}).addTo(_map);
var _dopRing = L.circle([33.7455, -117.8677], {radius: 10, color: ACCENT, fillColor: ACCENT, fillOpacity: 0.08, weight: 1.5, dashArray: '6,4'}).addTo(_map);
var _trail = L.polyline([], {color: OK, weight: 2, opacity: 0.6}).addTo(_map);
var _trailPoints = [];
var _lastLat = 0, _lastLon = 0;
var _simMode = false;
var _mapFollowing = true;

_map.on('click', function(e) {
  if (!_simMode) return;
  document.getElementById('sim-lat').value = e.latlng.lat.toFixed(6);
  document.getElementById('sim-lon').value = e.latlng.lng.toFixed(6);
  simSet();
});

_map.on('dragstart', function() { _mapFollowing = false; });

function setModeBtn(text, cls) {
  var btn = document.getElementById('gps-mode-btn');
  btn.textContent = text;
  btn.className = 'gps-mode-btn' + (cls ? ' ' + cls : '');
}

function toggleMode() {
  var newMode = _simMode ? 'serial' : 'simulate';
  setModeBtn('Switching...', 'warn');
  postJson('/gpscmd', {cmd:'switch_mode', mode:newMode})
    .then(function(d){ if (!d.ok) setModeBtn('Error', 'err'); })
    .catch(function(){ setModeBtn('Error', 'err'); });
}

function simSet() {
  postJson('/gpscmd', {
    cmd: 'set_position',
    lat: parseFloat(document.getElementById('sim-lat').value),
    lon: parseFloat(document.getElementById('sim-lon').value),
    alt: parseFloat(document.getElementById('sim-alt').value),
    speed: parseFloat(document.getElementById('sim-speed').value),
    heading: parseFloat(document.getElementById('sim-hdg').value)
  });
}

function setFixBadge(text, cls, showSim) {
  var badge = document.getElementById('gps-fix-badge');
  badge.className = 'gps-fix-badge ' + cls;
  badge.innerHTML = text + (showSim ? ' <span class="sim">(SIM)</span>' : '');
}

function updateGps() {
  fetch('/gpsstatus').then(function(r){return r.json()}).then(function(d) {
    _simMode = d.simulated || false;
    document.getElementById('gps-sim-panel').style.display = _simMode ? '' : 'none';

    if (_simMode) { setModeBtn('SIM', 'sim'); document.getElementById('gps-mode-btn').title = 'Switch to real GPS hardware'; }
    else          { setModeBtn('LIVE', 'live'); document.getElementById('gps-mode-btn').title = 'Switch to simulated GPS'; }

    if (!d.connected) setFixBadge('Disconnected', 'err', false);
    else if (d.fix === 0) setFixBadge('No Fix', 'warn', false);
    else if (d.fix === 1) setFixBadge('GPS Fix', 'ok', _simMode);
    else setFixBadge('DGPS Fix', 'ok', false);

    if (d.fix > 0) {
      document.getElementById('gps-pos').textContent = d.lat.toFixed(6) + ' / ' + d.lon.toFixed(6);
      document.getElementById('gps-alt').textContent = d.alt.toFixed(1);
      document.getElementById('gps-speed').textContent = d.speed.toFixed(1);
      document.getElementById('gps-hdg').textContent = d.heading.toFixed(0);
      document.getElementById('gps-hdop').textContent = d.hdop.toFixed(1);
      document.getElementById('gps-sats').textContent = d.satellites_used;
      document.getElementById('gps-fix-time').textContent = d.last_fix_time || '--';

      var ll = [d.lat, d.lon];
      _marker.setLatLng(ll);
      var dopRadius = Math.max(3, d.hdop * 5);
      _dopRing.setLatLng(ll);
      _dopRing.setRadius(dopRadius);
      var ringClr = dopRadius < 10 ? OK : dopRadius < 25 ? WARN : ERR;
      _dopRing.setStyle({color: ringClr, fillColor: ringClr});

      if (Math.abs(d.lat - _lastLat) > 0.0001 || Math.abs(d.lon - _lastLon) > 0.0001) {
        _trailPoints.push(ll);
        if (_trailPoints.length > 500) _trailPoints.shift();
        _trail.setLatLngs(_trailPoints);
        _lastLat = d.lat;
        _lastLon = d.lon;
      }

      if (_mapFollowing) _map.setView(ll);
    } else {
      ['gps-pos','gps-alt','gps-speed','gps-hdg','gps-hdop','gps-sats','gps-fix-time'].forEach(function(id){
        document.getElementById(id).textContent = id === 'gps-pos' ? '-- / --' : '--';
      });
    }

    var sats = d.satellites || [];
    var ch = '';
    for (var i = 0; i < sats.length; i++) {
      var s = sats[i];
      var pct = Math.min(100, Math.round(s.snr * 100 / 50));
      var cls = s.snr === 0 ? 'mute' : s.snr >= 35 ? '' : s.snr >= 20 ? 'warn' : 'err';
      ch += '<div class="sat-bar">';
      ch += '<span class="sat-prn">PRN ' + s.prn + '</span>';
      ch += '<div class="sat-track"><div class="sat-fill ' + cls + '" style="width:' + pct + '%;"></div></div>';
      ch += '<span class="sat-snr">' + s.snr + '</span>';
      ch += '</div>';
    }
    if (!ch) ch = '<span class="gps-label">No satellites in view</span>';
    document.getElementById('gps-sat-chart').innerHTML = ch;

  }).catch(function(){});
}

setInterval(updateGps, 2000);
updateGps();

var _recenterBtn = L.control({position: 'topright'});
_recenterBtn.onAdd = function() {
  var d = L.DomUtil.create('div', 'leaflet-bar');
  d.innerHTML = '<a href="#" title="Re-center" style="font-size:18px;line-height:26px;display:block;width:26px;height:26px;text-align:center;text-decoration:none;color:var(--t-bg);background:var(--t-text);">&#8982;</a>';
  d.onclick = function(e) { e.preventDefault(); e.stopPropagation(); _mapFollowing = true; return false; };
  return d;
};
_recenterBtn.addTo(_map);
</script>
</body></html>
