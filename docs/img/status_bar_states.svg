<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520">
  <rect width="100%" height="100%" fill="#1a1a1a" rx="4"/>
  <text font-family="&apos;Courier New&apos;, Courier, monospace" font-size="13">
    <tspan x="12" y="20"><tspan fill="#777777">Line 1 — Audio level bars:</tspan></tspan>
    <tspan x="12" y="44"><tspan fill="#ffffff">TX:</tspan><tspan fill="#ff5555">████--</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 67%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← Mumble→Radio  (red)</tspan></tspan>
    <tspan x="12" y="64"><tspan fill="#ffffff">RX:</tspan><tspan fill="#55ff55">███---</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 50%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← Radio→Mumble  (green)</tspan></tspan>
    <tspan x="12" y="84"><tspan fill="#ffffff">SP:</tspan><tspan fill="#55ffff">██----</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 34%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← Speaker out   (cyan)</tspan></tspan>
    <tspan x="12" y="104"><tspan fill="#55ffff">SDR1:</tspan><tspan fill="#55ffff">██----</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 34%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← SDR receiver  (cyan)</tspan></tspan>
    <tspan x="12" y="124"><tspan fill="#ff55ff">SDR2:</tspan><tspan fill="#ff55ff">█-----</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 18%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← SDR2 receiver (magenta)</tspan></tspan>
    <tspan x="12" y="144"><tspan fill="#ffffff">SV:</tspan><tspan fill="#ffff55">███---</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 50%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← Remote server (yellow)</tspan></tspan>
    <tspan x="12" y="164"><tspan fill="#ffffff">AN:</tspan><tspan fill="#ff5555">████--</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffff55"> 67%</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← Announce in   (red)</tspan></tspan>
    <tspan x="12" y="192"><tspan fill="#777777">Muted / Ducked states:</tspan></tspan>
    <tspan x="12" y="216"><tspan fill="#55ffff">SDR1:</tspan><tspan fill="#55ffff">-MUTE-</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#55ffff">M   </tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← muted</tspan></tspan>
    <tspan x="12" y="236"><tspan fill="#55ffff">SDR1:</tspan><tspan fill="#55ffff">-DUCK-</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#55ffff">D   </tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← ducked</tspan></tspan>
    <tspan x="12" y="268"><tspan fill="#777777">Line 2 — Timers, web, files, hardware:</tspan></tspan>
    <tspan x="12" y="292"><tspan fill="#ffffff">UP:</tspan><tspan fill="#55ffff">0d 02:14:37</tspan><tspan fill="#cccccc">  </tspan><tspan fill="#ffffff">S1:</tspan><tspan fill="#ff55ff">0d 01:02:15</tspan><tspan fill="#cccccc">  </tspan><tspan fill="#ffffff">S2:</tspan><tspan fill="#ff55ff">0d 00:28:43</tspan><tspan fill="#cccccc">  </tspan><tspan fill="#ffffff">S3:</tspan><tspan fill="#ff55ff">0d 00:45:09</tspan></tspan>
    <tspan x="12" y="316"><tspan fill="#ffffff">WEB:</tspan><tspan fill="#55ff55">8080</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← web config port (green)</tspan></tspan>
    <tspan x="12" y="340"><tspan fill="#ffffff">PWRB</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffffff">CHG:</tspan><tspan fill="#55ff55">CHRGE</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#55ff55">CAT</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← relay + CAT (idle)</tspan></tspan>
    <tspan x="12" y="360"><tspan fill="#ffff55">PWRB</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ffffff">CHG:</tspan><tspan fill="#ff5555">DRAIN</tspan><tspan fill="#cccccc"> </tspan><tspan fill="#ff5555">CAT</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← pulse + drain + active</tspan></tspan>
    <tspan x="12" y="388"><tspan fill="#55ff55">1</tspan><tspan fill="#55ff55">2</tspan><tspan fill="#ffffff">3</tspan><tspan fill="#ffffff">4</tspan><tspan fill="#ff5555">5</tspan><tspan fill="#ffffff">6</tspan><tspan fill="#ffffff">7</tspan><tspan fill="#ffffff">8</tspan><tspan fill="#ffffff">9</tspan><tspan fill="#55ff55">0</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← file slots (green=loaded, red=playing)</tspan></tspan>
    <tspan x="12" y="420"><tspan fill="#777777">Line 3 — Network (DNS + Cloudflare tunnel):</tspan></tspan>
    <tspan x="12" y="444"><tspan fill="#ffffff">DNS:</tspan><tspan fill="#ffff55">tpvm.ddns.net → 70.181.105.118</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← DDNS (yellow)</tspan></tspan>
    <tspan x="12" y="464"><tspan fill="#ffffff">DNS:</tspan><tspan fill="#ff5555">ERR</tspan><tspan fill="#cccccc">  </tspan><tspan fill="#ffffff">DNS:</tspan><tspan fill="#ffff55">...</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← error / waiting</tspan></tspan>
    <tspan x="12" y="492"><tspan fill="#ffffff">CF:</tspan><tspan fill="#ffff55">https://random-words.trycloudflare.com</tspan><tspan fill="#cccccc">   </tspan><tspan fill="#777777">← tunnel URL (yellow)</tspan></tspan>
  </text>
</svg>
