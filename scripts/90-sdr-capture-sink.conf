# Auto-create PipeWire null audio sinks for SDR capture.
# The gateway reads from sdr_capture.monitor / sdr_capture2.monitor via FFmpeg.
# Route your SDR app's audio outputs to these sinks in pavucontrol.

context.objects = [
  {
    factory = adapter
    args = {
      factory.name = support.null-audio-sink
      node.name = sdr_capture
      node.description = "SDR Capture Sink"
      media.class = Audio/Sink
      object.linger = true
      audio.position = [ FL FR ]
      monitor.channel-volumes = true
      monitor.passthrough = true
    }
  },
  {
    factory = adapter
    args = {
      factory.name = support.null-audio-sink
      node.name = sdr_capture2
      node.description = "SDR2 Capture Sink"
      media.class = Audio/Sink
      object.linger = true
      audio.position = [ FL FR ]
      monitor.channel-volumes = true
      monitor.passthrough = true
    }
  }
]
